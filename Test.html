<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EBH TEAM | অটো রেজিস্ট্রেশন</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans Bengali', sans-serif;
            background: linear-gradient(145deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="15" cy="15" r="2" fill="rgba(255,255,255,0.08)"/><circle cx="85" cy="25" r="3" fill="rgba(255,255,255,0.06)"/><circle cx="45" cy="80" r="2.5" fill="rgba(255,255,255,0.08)"/></svg>');
            background-size: 50px;
            pointer-events: none;
        }

        .reg-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 28px 25px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .logo {
            font-size: 46px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #ffd89b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 3px;
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            margin-top: 10px;
            font-weight: 600;
        }

        .reg-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 50px;
            padding: 35px 28px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .reg-title {
            background: linear-gradient(135deg, #203a43, #2c5364);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* তথ্য কার্ড */
        .info-card {
            background: linear-gradient(135deg, #e6fffa 0%, #f0fff4 100%);
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #2c5364;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #cbd5e0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 800;
            color: #234e52;
            font-size: 14px;
        }

        .info-value {
            color: #2d3748;
            font-weight: 600;
            word-break: break-all;
            text-align: right;
        }

        /* মেইন অটো বাটন */
        .auto-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #203a43, #2c5364);
            border: none;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 800;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 10px 25px rgba(44,83,100,0.4);
        }

        .auto-btn:active {
            transform: scale(0.97);
        }

        .auto-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        /* রেজাল্ট মেসেজ */
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 30px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            display: none;
        }

        .result-box.success {
            display: block;
            background: #c6f6d5;
            color: #22543d;
            border-left: 5px solid #48bb78;
        }

        .result-box.error {
            display: block;
            background: #fed7d7;
            color: #742a2a;
            border-left: 5px solid #f56565;
        }

        .result-box.warning {
            display: block;
            background: #feebc8;
            color: #7b341e;
            border-left: 5px solid #f59e0b;
        }

        .status-bar {
            background: rgba(44, 83, 100, 0.1);
            border-radius: 50px;
            padding: 12px 20px;
            margin-top: 25px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: #2c5364;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(44,83,100,0.2);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #48bb78;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .status-dot.offline {
            background: #f56565;
            animation: none;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 11px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="reg-container">
        <div class="header-card">
            <div class="logo">EBH TEAM</div>
            <div class="subtitle">✦ ওয়ান ক্লিক অটো রেজিস্ট্রেশন ✦</div>
        </div>

        <div class="reg-card">
            <div class="reg-title">
                <i class="fas fa-robot"></i>
                <span>এক ক্লিকে রেজিস্ট্রেশন</span>
            </div>

            <!-- অটো ডিটেক্ট তথ্য দেখাবে -->
            <div class="info-card" id="infoCard">
                <div class="info-row">
                    <span class="info-label"><i class="fab fa-telegram"></i> ইউজারনেম</span>
                    <span class="info-value" id="displayUsername">ডিটেক্ট হচ্ছে...</span>
                </div>
                <div class="info-row">
                    <span class="info-label"><i class="fas fa-id-card"></i> চ্যাট আইডি</span>
                    <span class="info-value" id="displayChatId">ডিটেক্ট হচ্ছে...</span>
                </div>
                <div class="info-row">
                    <span class="info-label"><i class="fas fa-user"></i> নাম</span>
                    <span class="info-value" id="displayName">ডিটেক্ট হচ্ছে...</span>
                </div>
            </div>

            <!-- এক ক্লিক অটো রেজিস্ট্রেশন বাটন -->
            <button class="auto-btn" id="autoRegBtn">
                <i class="fas fa-bolt"></i> অটো রেজিস্ট্রেশন (এক ক্লিক)
            </button>

            <!-- রেজাল্ট দেখানোর জায়গা -->
            <div id="resultBox" class="result-box"></div>

            <div class="status-bar" id="statusBar">
                <div class="status-dot" id="statusDot"></div>
                <span id="connectionStatus">সার্ভার সংযোগ হচ্ছে...</span>
            </div>
            
            <div style="margin-top: 20px; text-align: center; font-size: 11px; color: #718096;">
                <i class="fas fa-shield-alt"></i> আপনার তথ্য নিরাপদে সংরক্ষিত হবে
            </div>
        </div>
        <footer>
            <i class="fas fa-magic"></i> অটোমেটিক সিস্টাম | EBH TEAM
        </footer>
    </div>

    <script>
        // ===================== FIREBASE কনফিগ (আপনার দেওয়া) =====================
        const firebaseConfig = {
            apiKey: "AIzaSyCHqx6dAHeGFdtvY8682b_iQkdnk2ie0ug",
            authDomain: "saprahik-kaj.firebaseapp.com",
            databaseURL: "https://saprahik-kaj-default-rtdb.firebaseio.com",
            projectId: "saprahik-kaj",
            storageBucket: "saprahik-kaj.firebasestorage.app",
            messagingSenderId: "336661054558",
            appId: "1:336661054558:web:1beb394b660c9d6cf520cf"
        };

        // ===================== গ্লোবাল ভেরিয়েবল =====================
        let firebaseDb = null;
        let isConnected = false;
        let currentTelegramUser = null;
        let isRegistered = false;

        // ===================== ১. টেলিগ্রাম ওয়েব অ্যাপ থেকে ইউজার ডেটা নেওয়া =====================
        function getTelegramUserData() {
            try {
                // টেলিগ্রাম মিনি অ্যাপের জন্য
                if (window.Telegram && window.Telegram.WebApp) {
                    const webApp = window.Telegram.WebApp;
                    webApp.ready();  // ওয়েব অ্যাপ রেডি করে দেওয়া
                    webApp.expand(); // পুরো স্ক্রিন করুন
                    
                    const initData = webApp.initDataUnsafe;
                    if (initData && initData.user) {
                        const user = initData.user;
                        return {
                            chatId: user.id,
                            username: user.username || null,
                            firstName: user.first_name || "",
                            lastName: user.last_name || "",
                            fullName: (user.first_name || "") + (user.last_name ? " " + user.last_name : "")
                        };
                    }
                }
                
                // ডেমো মোড (শুধু টেস্ট করার জন্য - GitHub Pages এ থাকলেও কাজ করবে)
                console.log("টেলিগ্রাম মিনি অ্যাপ ডিটেক্ট হয়নি, ডেমো মোডে আছে");
                return null;
            } catch(e) {
                console.error("টেলিগ্রাম ডেটা লোড ERROR:", e);
                return null;
            }
        }

        // ===================== ২. UI তে ডেটা দেখানো =====================
        function displayTelegramInfo(user) {
            if (user && user.chatId) {
                // ইউজারনেম দেখানো
                let usernameText = user.username ? '@' + user.username : (user.firstName || 'ইউজারনেম নেই');
                document.getElementById('displayUsername').innerHTML = usernameText;
                document.getElementById('displayChatId').innerHTML = user.chatId;
                document.getElementById('displayName').innerHTML = user.fullName || user.firstName || 'টেলিগ্রাম ইউজার';
                return true;
            } else {
                document.getElementById('displayUsername').innerHTML = '❌ ডিটেক্ট হয়নি';
                document.getElementById('displayChatId').innerHTML = '❌ ডিটেক্ট হয়নি';
                document.getElementById('displayName').innerHTML = 'টেলিগ্রামে ওপেন করুন';
                return false;
            }
        }

        // ===================== ৩. ফায়ারবেস সংযোগ =====================
        async function connectToServer() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('connectionStatus');
            
            statusText.innerHTML = 'সার্ভার সংযোগ হচ্ছে...';
            
            try {
                // ফায়ারবেস initialize
                if (firebase.apps.length === 0) {
                    firebase.initializeApp(firebaseConfig);
                }
                firebaseDb = firebase.database();
                
                // সংযোগ চেক
                const connectedRef = firebaseDb.ref('.info/connected');
                connectedRef.on('value', (snap) => {
                    if (snap.val() === true) {
                        isConnected = true;
                        statusDot.className = 'status-dot';
                        statusDot.style.background = '#48bb78';
                        statusText.innerHTML = '✅ সার্ভার সংযুক্ত | রেজিস্ট্রেশন রেডি';
                        console.log("✅ ফায়ারবেস সংযুক্ত");
                        
                        // সংযোগ থাকলে রেজিস্ট্রেশন চেক
                        checkIfAlreadyRegistered();
                    } else {
                        isConnected = false;
                        statusDot.className = 'status-dot offline';
                        statusDot.style.background = '#f56565';
                        statusText.innerHTML = '⚠️ সার্ভার অফলাইন, ইন্টারনেট চেক করুন';
                    }
                });
                
            } catch(e) {
                console.error("সংযোগ ত্রুটি:", e);
                statusDot.className = 'status-dot offline';
                statusDot.style.background = '#f56565';
                statusText.innerHTML = '❌ সার্ভার সংযোগ ব্যর্থ';
            }
        }

        // ===================== ৪. আগে রেজিস্ট্রেশন করা আছে কিনা চেক =====================
        async function checkIfAlreadyRegistered() {
            if (!currentTelegramUser || !currentTelegramUser.chatId) return;
            if (!firebaseDb || !isConnected) return;
            
            try {
                const chatId = currentTelegramUser.chatId;
                const snapshot = await firebaseDb.ref('telegramUsers').orderByChild('chatId').equalTo(chatId).once('value');
                
                if (snapshot.exists()) {
                    isRegistered = true;
                    let userData = null;
                    snapshot.forEach((snap) => {
                        userData = snap.val();
                    });
                    
                    // বাটন ডিজেবল করে দেখানো যে আগেই রেজিস্টার্ড
                    const btn = document.getElementById('autoRegBtn');
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-check-circle"></i> ইতিমধ্যে রেজিস্টার্ড';
                    btn.style.opacity = '0.7';
                    btn.style.cursor = 'not-allowed';
                    
                    showResult(`✅ আপনি ইতিমধ্যে রেজিস্টার্ড! ইউজারনেম: ${userData?.username || currentTelegramUser.username}`, 'success');
                } else {
                    isRegistered = false;
                    // বাটন এনাবল
                    const btn = document.getElementById('autoRegBtn');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-bolt"></i> অটো রেজিস্ট্রেশন (এক ক্লিক)';
                    btn.style.opacity = '1';
                }
            } catch(e) {
                console.error("চেক করতে সমস্যা:", e);
            }
        }

        // ===================== ৫. মেইন ফাংশন: এক ক্লিক অটো রেজিস্ট্রেশন =====================
        window.autoRegister = async function() {
            // চেক: টেলিগ্রাম ডেটা আছে?
            if (!currentTelegramUser || !currentTelegramUser.chatId) {
                // আবার চেষ্টা
                currentTelegramUser = getTelegramUserData();
                if (!currentTelegramUser || !currentTelegramUser.chatId) {
                    showResult("❌ টেলিগ্রাম ডেটা পাওয়া যায়নি! দয়া করে টেলিগ্রাম অ্যাপের ভিতর এই পেজটি ওপেন করুন।", "error");
                    return;
                }
                displayTelegramInfo(currentTelegramUser);
            }
            
            // সার্ভার চেক
            if (!firebaseDb || !isConnected) {
                showResult("❌ সার্ভারের সাথে সংযোগ নেই, পরে আবার চেষ্টা করুন।", "error");
                return;
            }
            
            // আগে রেজিস্টার্ড চেক
            if (isRegistered) {
                showResult("✅ আপনি ইতিমধ্যে রেজিস্টার্ড হয়ে গেছেন!", "success");
                return;
            }
            
            const btn = document.getElementById('autoRegBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> রেজিস্ট্রেশন হচ্ছে...';
            
            const chatId = currentTelegramUser.chatId;
            let username = currentTelegramUser.username;
            const fullName = currentTelegramUser.fullName || currentTelegramUser.firstName || "Telegram User";
            
            // ইউজারনাম না থাকলে চ্যাটআইডি দিয়ে তৈরি
            if (!username) {
                username = `user_${chatId}`;
            }
            
            const cleanUsername = username.toString().toLowerCase().replace('@', '');
            const fullUsername = '@' + cleanUsername;
            
            try {
                // ডুপ্লিকেট চেক (নিশ্চিত করার জন্য আবার)
                const existingUser = await firebaseDb.ref(`telegramUsers/${cleanUsername}`).once('value');
                const existingByChatId = await firebaseDb.ref('telegramUsers').orderByChild('chatId').equalTo(chatId).once('value');
                
                if (existingByChatId.exists() || existingUser.exists()) {
                    showResult(`⚠️ এই চ্যাট আইডি (${chatId}) ইতিমধ্যে রেজিস্টার্ড আছে!`, "warning");
                    isRegistered = true;
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-check-circle"></i> ইতিমধ্যে রেজিস্টার্ড';
                    return;
                }
                
                // ডাটা সেভ করা
                const userData = {
                    chatId: parseInt(chatId),
                    username: fullUsername,
                    fullName: fullName,
                    registeredAt: Date.now(),
                    lastActive: Date.now(),
                    autoRegistered: true,
                    method: "one_click_auto",
                    rawUsername: username
                };
                
                await firebaseDb.ref(`telegramUsers/${cleanUsername}`).set(userData);
                
                // সফল
                isRegistered = true;
                showResult(`🎉 রেজিস্ট্রেশন সফল! 🎉<br><strong>ইউজারনেম:</strong> ${fullUsername}<br><strong>চ্যাট আইডি:</strong> ${chatId}`, "success");
                
                btn.innerHTML = '<i class="fas fa-check-circle"></i> রেজিস্ট্রেশন সম্পন্ন';
                btn.style.opacity = '0.7';
                
                // টেলিগ্রাম ওয়েব অ্যাপ বন্ধ করার অপশন (চাইলে)
                if (window.Telegram && window.Telegram.WebApp) {
                    setTimeout(() => {
                        // ইউজারকে মেসেজ দেখিয়ে অ্যাপ ক্লোজ
                        window.Telegram.WebApp.showAlert("আপনার রেজিস্ট্রেশন সম্পন্ন হয়েছে! ধন্যবাদ।");
                    }, 500);
                }
                
            } catch(e) {
                console.error("রেজিস্ট্রেশন ত্রুটি:", e);
                showResult("❌ রেজিস্ট্রেশন ব্যর্থ: " + e.message, "error");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-bolt"></i> আবার চেষ্টা করুন';
            }
        };
        
        // ===================== ৬. রেজাল্ট দেখানোর ফাংশন =====================
        function showResult(message, type) {
            const resultBox = document.getElementById('resultBox');
            resultBox.className = `result-box ${type}`;
            resultBox.innerHTML = message;
            
            // ৫ সেকেন্ড পর অটো হাইড
            setTimeout(() => {
                if (resultBox.className.includes(type)) {
                    resultBox.style.display = 'none';
                    resultBox.className = 'result-box';
                }
            }, 8000);
        }

        // ===================== ৭. পেজ লোডে সবকিছু শুরু =====================
        window.addEventListener('DOMContentLoaded', async () => {
            // টেলিগ্রাম থেকে ডেটা নেওয়া
            currentTelegramUser = getTelegramUserData();
            
            // UI তে দেখানো
            const hasData = displayTelegramInfo(currentTelegramUser);
            
            // ফায়ারবেস সংযোগ
            await connectToServer();
            
            // ডাটা না থাকলে মেসেজ
            if (!hasData || !currentTelegramUser || !currentTelegramUser.chatId) {
                showResult("⚠️ আপনি টেলিগ্রাম মিনি অ্যাপের ভিতর থেকে ওপেন করেননি। দয়া করে বটের মাধ্যমে ওপেন করুন।", "warning");
                const btn = document.getElementById('autoRegBtn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> টেলিগ্রামে ওপেন করুন';
            }
        });
    </script>
</body>
</html>
