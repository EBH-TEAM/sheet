<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Advance MetaTool | Send Message</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .sender-card {
            max-width: 450px;
            width: 100%;
            background: #FFFFFF;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .logo-area {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(135deg, #2563EB 0%, #7C3AED 100%);
        }

        .logo-icon { font-size: 3rem; margin-bottom: 8px; }
        .logo-title { font-size: 1.6rem; font-weight: 800; color: white; }
        .logo-sub { font-size: 0.7rem; color: rgba(255,255,240,0.9); margin-top: 6px; }

        .content { padding: 28px 24px 32px; }

        .input-group { margin-bottom: 22px; }
        label { display: block; color: #334155; font-weight: 600; margin-bottom: 8px; font-size: 0.85rem; }
        input, textarea {
            width: 100%;
            background: #F8FAFE;
            border: 1.5px solid #E2E8F0;
            border-radius: 24px;
            padding: 14px 18px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        input:focus, textarea:focus { border-color: #7C3AED; background: #FFFFFF; box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1); }

        .shortcut-btn {
            background: linear-gradient(95deg, #FCE7F3, #FDF2F8);
            border: 1px solid #F9A8D4;
            border-radius: 40px;
            padding: 14px 18px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #BE185D;
            font-weight: 600;
        }
        .shortcut-btn:hover { background: #FCE7F3; border-color: #EC4899; }

        .send-btn {
            background: linear-gradient(95deg, #2563EB, #7C3AED);
            width: 100%;
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            margin: 10px 0;
            transition: 0.2s;
        }
        .send-btn:active { transform: scale(0.97); }

        .status {
            background: #F1F5F9;
            border-radius: 20px;
            padding: 12px;
            font-size: 0.75rem;
            text-align: center;
            color: #475569;
            margin-top: 20px;
            border-left: 4px solid #7C3AED;
        }

        .credit { text-align: center; font-size: 0.6rem; color: #94A3B8; margin-top: 20px; padding-top: 16px; border-top: 1px solid #E2E8F0; }
    </style>
</head>
<body>
<div class="sender-card">
    <div class="logo-area">
        <div class="logo-icon">📡</div>
        <div class="logo-title">Advance MetaTool</div>
        <div class="logo-sub">MESSAGE SENDER</div>
    </div>
    <div class="content">
        <div class="input-group">
            <label>🆔 চ্যাট আইডি (শুধু সংখ্যা)</label>
            <input type="text" id="chatIdInput" placeholder="উদাহরণ: 123456789" inputmode="numeric">
        </div>
        <div class="input-group">
            <label>📝 মেসেজ লিখুন</label>
            <textarea id="messageInput" rows="4" placeholder="আপনার মেসেজ লিখুন..."></textarea>
        </div>
        <div id="shortcutBtn" class="shortcut-btn">
            <span>✨</span> 📨 এডমিন মেসেজ (শর্টকাট)
        </div>
        <button id="sendBtn" class="send-btn">✈️ সেন্ড মেসেজ</button>
        <div id="statusMsg" class="status">✅ প্রস্তুত | মেসেজ পাঠালে চ্যাট আইডি সংরক্ষিত হবে</div>
        <div class="credit">secured • telegram messenger • firebase cloud</div>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBg3DjdzzwEt1M76MIc3ynyyYMjmNRgaYc",
        authDomain: "lt-play-9c597.firebaseapp.com",
        databaseURL: "https://lt-play-9c597-default-rtdb.firebaseio.com",
        projectId: "lt-play-9c597",
        storageBucket: "lt-play-9c597.firebasestorage.app",
        messagingSenderId: "294625465495",
        appId: "1:294625465495:web:c6714068cd607abfd545d2",
        measurementId: "G-JB6929GT1T"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const BOT_TOKEN = "8901671743:AAGmtT_ZE9Ex70KISpKQDCL-H-u24kvxEsk";
    const PERMANENT_CHANNEL_URL = "https://t.me/EBH_METATOOL";

    // ফাংশন: চ্যাট আইডি Firebase এ সেভ করা
    async function saveChatIdToFirebase(chatId) {
        try {
            await database.ref(`chatids/${chatId}`).set({
                id: chatId,
                timestamp: Date.now(),
                date: new Date().toISOString()
            });
            return true;
        } catch (error) {
            console.error("Firebase save error:", error);
            return false;
        }
    }

    function getInlineKeyboard() {
        return {
            inline_keyboard: [
                [{ text: "🚀 Join Official Channel 🚀", url: PERMANENT_CHANNEL_URL }]
            ]
        };
    }

    function getCurrentDateTime() {
        const now = new Date();
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = now.getFullYear();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        return { dateStr: `${day}-${month}-${year}`, timeStr: `${hours}:${minutes}:${seconds}` };
    }

    function getAdminMessage() {
        const { dateStr, timeStr } = getCurrentDateTime();
        return `━━━━━━━━━━━━━━━━━━━━━\n👑 <b>𝗔𝗗𝗠𝗜𝗡 𝗠𝗘𝗦𝗦𝗔𝗚𝗘</b> 👑\n📅 ${dateStr}  🕐 ${timeStr}\n━━━━━━━━━━━━━━━━━━━━━\n\n✅ <b>আপনার ফাইল সফলভাবে রিসিভ করা হয়েছে!</b>\n\n💖 <b>আমাদের সাথে কাজ করার জন্য আন্তরিক ধন্যবাদ।</b>\n\n━━━━━━━━━━━━━━━━━━━━━\n✨ <b>𝗧𝗵𝗮𝗻𝗸𝘀 𝗙𝗼𝗿 𝗨𝘀𝗶𝗻𝗴</b> ✨\n🚀 <b>𝗔𝗱𝘃𝗮𝗻𝗰𝗲 𝗠𝗲𝘁𝗮𝗧𝗼𝗼𝗹</b> 🚀\n━━━━━━━━━━━━━━━━━━━━━`;
    }

    document.getElementById('shortcutBtn').addEventListener('click', () => {
        document.getElementById('messageInput').value = getAdminMessage();
        document.getElementById('statusMsg').innerHTML = "📋 এডমিন মেসেজ বসানো হয়েছে। এখন সেন্ড করুন।";
    });

    document.getElementById('chatIdInput').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
    });

    async function sendToTelegram(chatId, text) {
        const payload = {
            chat_id: chatId.trim(),
            text: text.trim(),
            parse_mode: "HTML",
            reply_markup: JSON.stringify(getInlineKeyboard())
        };
        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!result.ok) throw new Error(result.description);
        return result;
    }

    document.getElementById('sendBtn').addEventListener('click', async () => {
        const chatId = document.getElementById('chatIdInput').value.trim();
        const message = document.getElementById('messageInput').value.trim();
        const statusDiv = document.getElementById('statusMsg');

        if (!chatId) {
            statusDiv.innerHTML = "❌ চ্যাট আইডি দিন!";
            statusDiv.style.borderLeftColor = "#F87171";
            return;
        }
        if (!message) {
            statusDiv.innerHTML = "❓ মেসেজ লিখুন!";
            statusDiv.style.borderLeftColor = "#FBBF24";
            return;
        }
        if (!/^\d+$/.test(chatId)) {
            statusDiv.innerHTML = "⚠️ চ্যাট আইডি শুধুমাত্র সংখ্যা হতে হবে!";
            statusDiv.style.borderLeftColor = "#F87171";
            return;
        }

        statusDiv.innerHTML = "⏳ মেসেজ পাঠানো হচ্ছে...";
        statusDiv.style.borderLeftColor = "#FBBF24";
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('sendBtn').style.opacity = "0.7";

        try {
            await sendToTelegram(chatId, message);
            await saveChatIdToFirebase(chatId);
            const nowTime = new Date().toLocaleString('bn-BD');
            statusDiv.innerHTML = `✅ সফল! চ্যাট আইডি সংরক্ষিত হয়েছে (${nowTime})`;
            statusDiv.style.borderLeftColor = "#10B981";
        } catch (error) {
            statusDiv.innerHTML = `❌ ব্যর্থ: ${error.message}`;
            statusDiv.style.borderLeftColor = "#EF4444";
        } finally {
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('sendBtn').style.opacity = "1";
        }
    });
</script>
</body>
</html>
