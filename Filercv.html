<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Advance MetaTool | File Receiver + Auto Save</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #EFF6FF 0%, #F9F4FF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .receiver-card {
            max-width: 450px;
            width: 100%;
            background: #FFFFFF;
            border-radius: 40px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 20px 35px -12px rgba(59, 130, 246, 0.2), 0 0 0 1px rgba(236, 72, 153, 0.1) inset;
            overflow: hidden;
        }
        .logo-area {
            padding: 28px 20px 20px 20px;
            text-align: center;
            background: linear-gradient(135deg, #2563EB 0%, #EC4899 100%);
        }
        .logo-icon { font-size: 3rem; margin-bottom: 8px; display: inline-block; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15)); }
        .logo-title { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; color: white; text-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo-sub { font-size: 0.7rem; color: rgba(255,255,240,0.9); margin-top: 6px; letter-spacing: 0.8px; font-weight: 500; }
        .content { padding: 24px 22px 32px; background: #FFFFFF; }
        .input-field { margin-bottom: 28px; }
        .input-label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; color: #1E40AF; font-weight: 600; font-size: 0.85rem; }
        .chat-input, .message-input { width: 100%; background: #F8FAFE; border: 1.5px solid #DBEAFE; border-radius: 28px; padding: 14px 18px; font-size: 1rem; color: #1E293B; outline: none; transition: all 0.2s; font-family: inherit; }
        .chat-input:focus, .message-input:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); background: #FFFFFF; }
        .shortcut-btn {
            background: linear-gradient(95deg, #FCE7F3, #FDF2F8);
            border: 1px solid #F9A8D4;
            border-radius: 40px;
            padding: 12px 18px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #BE185D;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .shortcut-btn:hover { background: #FCE7F3; border-color: #EC4899; transform: scale(0.98); box-shadow: 0 4px 10px rgba(236, 72, 153, 0.2); }
        .send-button {
            background: linear-gradient(95deg, #2563EB, #3B82F6);
            width: 100%;
            border: none;
            padding: 15px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            margin: 24px 0 18px;
            transition: 0.2s;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.3);
        }
        .send-button:active { transform: scale(0.97); background: #1D4ED8; }
        .status-area { background: #EFF6FF; border-radius: 24px; padding: 12px 16px; font-size: 0.75rem; text-align: center; color: #1E3A8A; border-left: 4px solid #3B82F6; word-break: break-word; }
        .credit { text-align: center; font-size: 0.6rem; color: #94A3B8; margin-top: 16px; padding-top: 12px; border-top: 1px solid #E2E8F0; }
    </style>
</head>
<body>
<div class="receiver-card">
    <div class="logo-area">
        <div class="logo-icon">📡</div>
        <div class="logo-title">Advance MetaTool</div>
        <div class="logo-sub">FILE RECEIVER + AUTO SAVE</div>
    </div>
    <div class="content">
        <div class="input-field">
            <div class="input-label"><span>🆔</span> <span>চ্যাট আইডি (শুধু সংখ্যা)</span></div>
            <input type="text" id="chatIdInput" class="chat-input" placeholder="উদাহরণ: 123456789" inputmode="numeric" autocomplete="off">
        </div>
        <div class="input-field">
            <div class="input-label"><span>📝</span> <span>মেসেজ লিখুন</span></div>
            <textarea id="messageInput" class="message-input" rows="3" placeholder="আপনার মেসেজ লিখুন..."></textarea>
        </div>
        <div id="shortcutMsgBtn" class="shortcut-btn">
            <span class="shortcut-icon">✨</span>
            <span>📨 এডমিন মেসেজ (শর্টকাট)</span>
        </div>
        <button id="sendBtn" class="send-button">✈️ সেন্ড মেসেজ</button>
        <div id="statusMsg" class="status-area">✅ প্রস্তুত | মেসেজ পাঠালেই চ্যাট আইডি স্টোর হবে</div>
        <div class="credit">secured • telegram messenger • auto collector</div>
    </div>
</div>
<script>
    const BOT_TOKEN = "8901671743:AAGmtT_ZE9Ex70KISpKQDCL-H-u24kvxEsk";
    const TELEGRAM_API = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    const STORAGE_KEY = "advance_metatool_chatids";

    const chatIdInput = document.getElementById('chatIdInput');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('statusMsg');
    const shortcutBtn = document.getElementById('shortcutMsgBtn');
    const PERMANENT_CHANNEL_URL = "https://t.me/EBH_METATOOL";

    function getInlineKeyboard() {
        return { inline_keyboard: [[{ text: "🚀 Join Official Channel 🚀", url: PERMANENT_CHANNEL_URL }]] };
    }

    // ---------- স্টোরেজ ফাংশন ----------
    function saveChatId(chatId) {
        if (!chatId) return false;
        let existing = localStorage.getItem(STORAGE_KEY);
        let ids = existing ? JSON.parse(existing) : [];
        if (!ids.includes(chatId)) {
            ids.push(chatId);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
            return true;
        }
        return false;
    }

    function getCurrentDateTime() {
        const now = new Date();
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = now.getFullYear();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        return { dateStr: `${day}-${month}-${year}`, timeStr: `${hours}:${minutes}:${seconds}` };
    }

    function getAdminMessage() {
        const { dateStr, timeStr } = getCurrentDateTime();
        return `━━━━━━━━━━━━━━━━━━━━━\n👑 <b>𝗔𝗗𝗠𝗜𝗡 𝗠𝗘𝗦𝗦𝗔𝗚𝗘</b> 👑\n📅 ${dateStr}  🕐 ${timeStr}\n━━━━━━━━━━━━━━━━━━━━━\n\n✅ <b>আপনার ফাইল সফলভাবে রিসিভ করা হয়েছে!</b>\n\n💖 <b>আমাদের সাথে কাজ করার জন্য আন্তরিক ধন্যবাদ।</b>\n\n━━━━━━━━━━━━━━━━━━━━━\n✨ <b>𝗧𝗵𝗮𝗻𝗸𝘀 𝗙𝗼𝗿 𝗨𝘀𝗶𝗻𝗴</b> ✨\n🚀 <b>𝗔𝗱𝘃𝗮𝗻𝗰𝗲 𝗠𝗲𝘁𝗮𝗧𝗼𝗼𝗹</b> 🚀\n━━━━━━━━━━━━━━━━━━━━━`;
    }

    shortcutBtn.addEventListener('click', () => {
        messageInput.value = getAdminMessage();
        statusDiv.innerHTML = "📋 এডমিন মেসেজ বসানো হয়েছে। এখন সেন্ড করুন।";
        statusDiv.style.borderLeftColor = "#EC4899";
    });

    async function sendToTelegram(chatId, text) {
        if (!chatId || chatId.trim() === "") throw new Error("চ্যাট আইডি খালি!");
        if (!text || text.trim() === "") throw new Error("মেসেজ খালি!");
        const payload = {
            chat_id: chatId.trim(),
            text: text.trim(),
            parse_mode: "HTML",
            reply_markup: JSON.stringify(getInlineKeyboard())
        };
        const response = await fetch(TELEGRAM_API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!result.ok) throw new Error(result.description || "টেলিগ্রাম এপিআই ত্রুটি");
        return result;
    }

    sendButton.addEventListener('click', async () => {
        const rawChatId = chatIdInput.value.trim();
        const messageText = messageInput.value.trim();

        if (!rawChatId) {
            statusDiv.innerHTML = "❌ চ্যাট আইডি দিন!";
            statusDiv.style.borderLeftColor = "#F87171";
            return;
        }
        if (!messageText) {
            statusDiv.innerHTML = "❓ মেসেজ খালি! কিছু লিখুন বা শর্টকাট ব্যবহার করুন।";
            statusDiv.style.borderLeftColor = "#FBBF24";
            return;
        }
        if (!/^\d+$/.test(rawChatId)) {
            statusDiv.innerHTML = "⚠️ চ্যাট আইডি শুধুমাত্র সংখ্যা হতে হবে!";
            statusDiv.style.borderLeftColor = "#F87171";
            return;
        }

        statusDiv.innerHTML = "⏳ মেসেজ পাঠানো হচ্ছে...";
        statusDiv.style.borderLeftColor = "#FBBF24";
        sendButton.disabled = true;
        sendButton.style.opacity = "0.7";

        try {
            await sendToTelegram(rawChatId, messageText);
            // সফল হলে চ্যাট আইডি সেভ করবে
            const isNew = saveChatId(rawChatId);
            const savedMsg = isNew ? " + নতুন আইডি স্টোর করা হয়েছে!" : " (আইডি আগে থেকেই স্টোরে ছিল)";
            const nowTime = new Date().toLocaleString('bn-BD');
            statusDiv.innerHTML = `✅ সফল! ${savedMsg}\n📨 চ্যাট আইডি: ${rawChatId} (${nowTime})`;
            statusDiv.style.borderLeftColor = "#10B981";
        } catch (error) {
            statusDiv.innerHTML = `❌ ব্যর্থ: ${error.message}`;
            statusDiv.style.borderLeftColor = "#EF4444";
        } finally {
            sendButton.disabled = false;
            sendButton.style.opacity = "1";
        }
    });

    chatIdInput.addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
    });
</script>
</body>
</html>
