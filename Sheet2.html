    .uid-toggle-switch {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 16px;
      background-color: #ccc;
      border-radius: 32px;
      display: inline-block;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
    }
    .uid-toggle-switch::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      background-color: white;
      border-radius: 50%;
      top: 1px;
      left: 1px;
      transition: 0.2s;
    }
    .uid-toggle-switch.active {
      background-color: #10b981;
    }
    .uid-toggle-switch.active::after {
      transform: translateX(16px);
    }
    .password-toggle-switch {
      position: absolute;
      right: 4px;
      top: 50%;

      width: 32px;
      height: 16px;
      background-color: #ccc;

    .password-toggle-switch::after {

      width: 14px;
      height: 14px;
      background-color: white;

      top: 1px;

    }
    .password-toggle-switch.active {

    }
    .password-toggle-switch.active::after {

    }

  function showToast(msg) { 
    const toast = document.getElementById('liveToast'); 
    if(!toast) return;
    toast.innerText = msg; 
    toast.style.opacity = '1'; 
    setTimeout(function() { toast.style.opacity = '0'; }, 1800); 
  }
  
  function escapeHtml(str) { 
    if(!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    });
  }
  
  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(function() {
      showToast("✅ কপি হয়েছে: " + text);
    }).catch(function() {
      showToast("❌ কপি করতে ব্যর্থ");
    });
  }

  function getCurrentSheetData() {
    return currentSheet === 1 ? sheetData1 : sheetData2;
  }
  
  function getCurrentSubmittedUIDs() {
    return currentSheet === 1 ? submittedUIDs1 : submittedUIDs2;
  }
  
  function updateCurrentSheetData(newData) {
    if(currentSheet === 1) sheetData1 = newData;
    else sheetData2 = newData;
  }

  function loadUidValidationState() {
    const saved = localStorage.getItem(UID_VALIDATION_STATE_KEY);
    if(saved !== null) isUidValidationEnabled = saved === 'true';
    else isUidValidationEnabled = true;
    if(uidToggle) {
      if(isUidValidationEnabled) uidToggle.classList.add('active');
      else uidToggle.classList.remove('active');
    }
  }
  
  function saveUidValidationState() {
    localStorage.setItem(UID_VALIDATION_STATE_KEY, isUidValidationEnabled);
  }

  function loadPasswordAutoState() {
    const saved = localStorage.getItem(PASSWORD_AUTO_STATE_KEY);
    if(saved !== null) isPasswordAutoEnabled = saved === 'true';
    else isPasswordAutoEnabled = true;
    if(passwordAutoToggle) {
      if(isPasswordAutoEnabled) passwordAutoToggle.classList.add('active');
      else passwordAutoToggle.classList.remove('active');
    }
  }
  
  function savePasswordAutoState() {
    localStorage.setItem(PASSWORD_AUTO_STATE_KEY, isPasswordAutoEnabled);
  }

  function toggleUidValidation() {
    isUidValidationEnabled = !isUidValidationEnabled;
    if(uidToggle) {
      if(isUidValidationEnabled) uidToggle.classList.add('active');
      else uidToggle.classList.remove('active');
    }
    saveUidValidationState();
    showToast(isUidValidationEnabled ? "UID ভ্যালিডেশন চালু (শুধু সংখ্যা)" : "UID ভ্যালিডেশন বন্ধ (যেকোনো লেখা)");
  }

  function togglePasswordAuto() {
    isPasswordAutoEnabled = !isPasswordAutoEnabled;
    if(passwordAutoToggle) {
      if(isPasswordAutoEnabled) passwordAutoToggle.classList.add('active');
      else passwordAutoToggle.classList.remove('active');
    }
    savePasswordAutoState();
    showToast(isPasswordAutoEnabled ? "পাসওয়ার্ড অটো অন (নতুন UID-তে অটো সেট হবে)" : "পাসওয়ার্ড অটো অফ (ম্যানুয়ালি লিখুন)");
    fullRender();
  }

  function switchToSheet1() {
    if(currentSheet === 1) return;
    currentSheet = 1;
    sheet1Btn.classList.add('active');
    sheet2Btn.classList.remove('active');
    fullRender();
    showToast("শীট ১ এ স্যুইচ করা হয়েছে");
  }
  
  function switchToSheet2() {
    if(currentSheet === 2) return;
    currentSheet = 2;
    sheet2Btn.classList.add('active');
    sheet1Btn.classList.remove('active');
    fullRender();
    showToast("শীট ২ এ স্যুইচ করা হয়েছে");
  }

  function saveAuthToken(username, password) {
    localStorage.setItem(AUTH_TOKEN_KEY, JSON.stringify({ username: username, password: password, timestamp: Date.now() }));
  }
  
  function getAuthToken() {
    try {
      const data = localStorage.getItem(AUTH_TOKEN_KEY);
      if(data) return JSON.parse(data);
    } catch(e) {}
    return null;
  }
  
  function clearAuthToken() {
    localStorage.removeItem(AUTH_TOKEN_KEY);
  }

  function loadSheet1FromLocalStorage(username) {
    const savedSheet = localStorage.getItem(SHEET1_STORAGE_KEY + username);
    if(savedSheet) {
      try { 
        const parsed = JSON.parse(savedSheet);
        if(parsed && parsed.length === ROWS) sheetData1 = parsed;
        else sheetData1 = createEmptySheet();
      } catch(e) { console.warn(e); sheetData1 = createEmptySheet(); }
    } else {
      sheetData1 = createEmptySheet();
    }
    const savedSubmitted = localStorage.getItem(SHEET1_SUBMITTED_KEY + username);
    if(savedSubmitted) {
      try { submittedUIDs1 = new Set(JSON.parse(savedSubmitted)); } catch(e) { console.warn(e); }
    }
  }
  
  function loadSheet2FromLocalStorage(username) {
    const savedSheet = localStorage.getItem(SHEET2_STORAGE_KEY + username);
    if(savedSheet) {
      try { 
        const parsed = JSON.parse(savedSheet);
        if(parsed && parsed.length === ROWS) sheetData2 = parsed;
        else sheetData2 = createEmptySheet();
      } catch(e) { console.warn(e); sheetData2 = createEmptySheet(); }
    } else {
      sheetData2 = createEmptySheet();
    }
    const savedSubmitted = localStorage.getItem(SHEET2_SUBMITTED_KEY + username);
    if(savedSubmitted) {
      try { submittedUIDs2 = new Set(JSON.parse(savedSubmitted)); } catch(e) { console.warn(e); }
    }
  }
  
  function saveSheet1ToLocalStorage(username) {
    localStorage.setItem(SHEET1_STORAGE_KEY + username, JSON.stringify(sheetData1));
    localStorage.setItem(SHEET1_SUBMITTED_KEY + username, JSON.stringify(Array.from(submittedUIDs1)));
  }
  
  function saveSheet2ToLocalStorage(username) {
    localStorage.setItem(SHEET2_STORAGE_KEY + username, JSON.stringify(sheetData2));
    localStorage.setItem(SHEET2_SUBMITTED_KEY + username, JSON.stringify(Array.from(submittedUIDs2)));
  }
  
  function saveAllToLocalStorage(username) {
    if(!username) return;
    saveSheet1ToLocalStorage(username);
    saveSheet2ToLocalStorage(username);
  }

  async function loadUserDataFromFirebase(username) {
    if(!firebaseDb) return false;
    try {
      const snapshot = await firebaseDb.ref('userSheets/' + username).once('value');
      const data = snapshot.val();
      if(data) {
        if(data.sheetData && data.sheetData.length === ROWS) sheetData1 = data.sheetData;
        if(data.submittedUIDs) submittedUIDs1 = new Set(data.submittedUIDs);
        if(data.sheetData2 && data.sheetData2.length === ROWS) sheetData2 = data.sheetData2;
        if(data.submittedUIDs2) submittedUIDs2 = new Set(data.submittedUIDs2);
        if(data.chatId) currentChatId = data.chatId;
        if(data.telegramUsername) currentTelegramUsername = data.telegramUsername;
        if(tgUsernameInput) tgUsernameInput.value = currentTelegramUsername || '';
        if(tgChatIdInput && currentChatId) tgChatIdInput.value = currentChatId;
        saveAllToLocalStorage(username);
        return true;
      }
    } catch(e) { console.warn(e); }
    return false;
  }

  function saveUserDataToFirebase(username) {
    if(!firebaseDb || !username) return;
    const tgUsernameRaw = tgUsernameInput ? tgUsernameInput.value.trim() : "";
    const chatIdRaw = tgChatIdInput ? tgChatIdInput.value.trim() : "";
    if (tgUsernameRaw && !tgUsernameRaw.startsWith('@')) currentTelegramUsername = '@' + tgUsernameRaw;
    else currentTelegramUsername = tgUsernameRaw;
    currentChatId = chatIdRaw;
    
    const dataToSave = {
      sheetData: sheetData1,
      submittedUIDs: Array.from(submittedUIDs1),
      sheetData2: sheetData2,
      submittedUIDs2: Array.from(submittedUIDs2),
      chatId: currentChatId,
      telegramUsername: currentTelegramUsername,
      lastUpdated: Date.now()
    };
    firebaseDb.ref('userSheets/' + username).set(dataToSave).catch(function(e){ console.warn(e); });
    
    if(currentTelegramUsername && currentTelegramUsername !== "") {
      var cleanUser = currentTelegramUsername.replace('@', '').toLowerCase();
      firebaseDb.ref('telegramUsers/' + cleanUser).set({
        chatId: parseInt(currentChatId) || 0,
        username: currentTelegramUsername,
        linkedAccount: username
      }).catch(function(e){ console.warn(e); });
    }
  }

  function createEmptySheet() {
    var newSheet = [];
    for (var i = 0; i < ROWS; i++) {
      newSheet[i] = [];
      for (var j = 0; j < COLS; j++) {
        newSheet[i][j] = '';
      }
      newSheet[i][0] = (i+1).toString();
    }
    return newSheet;
  }

  async function initUserSession(username, password, isNew) {
    undoStack = [];
    redoStack = [];
    
    currentLoggedInUser = username;
    
    sheetData1 = createEmptySheet();
    sheetData2 = createEmptySheet();
    submittedUIDs1 = new Set();
    submittedUIDs2 = new Set();
    
    var loaded = await loadUserDataFromFirebase(username);
    if(!loaded) {
      loadSheet1FromLocalStorage(username);
      loadSheet2FromLocalStorage(username);
    }
    
    if(!sheetData1 || sheetData1.length !== ROWS) sheetData1 = createEmptySheet();
    if(!sheetData2 || sheetData2.length !== ROWS) sheetData2 = createEmptySheet();
    
    if(tgUsernameInput && tgUsernameInput.value) currentTelegramUsername = tgUsernameInput.value;
    if(tgChatIdInput && tgChatIdInput.value) currentChatId = tgChatIdInput.value;
    
    if(displayUsernameSpan) displayUsernameSpan.innerText = username;
    currentSheet = 1;
    if(sheet1Btn) sheet1Btn.classList.add('active');
    if(sheet2Btn) sheet2Btn.classList.remove('active');
    fullRender();
    saveUserDataToFirebase(username);
    
    if(loadingScreen) loadingScreen.classList.add('hide');
    if(loginOverlay) loginOverlay.classList.remove('visible');
    if(appContainer) appContainer.classList.add('visible');
    saveAuthToken(username, password);
  }

  function logout() {
    if(currentLoggedInUser) {
      saveUserDataToFirebase(currentLoggedInUser);
    }
    clearAuthToken();
    currentLoggedInUser = null;
    currentTelegramUsername = "";
    sheetData1 = [];
    sheetData2 = [];
    if(submittedUIDs1) submittedUIDs1.clear();
    if(submittedUIDs2) submittedUIDs2.clear();
    
    if(loadingScreen) loadingScreen.classList.add('hide');
    if(loginOverlay) loginOverlay.classList.add('visible');
    if(appContainer) appContainer.classList.remove('visible');
    if(loginUsernameInput) loginUsernameInput.value = '';
    if(loginPasswordInput) loginPasswordInput.value = '';
    if(loginError) loginError.style.display = 'none';
  }

  async function handleLoginOrRegister() {
    var username = loginUsernameInput.value.trim();
    var password = loginPasswordInput.value.trim();
    if(!username || !password) {
      if(loginError) {
        loginError.innerText = "ইউজারনেম ও পাসওয়ার্ড দিন";
        loginError.style.display = 'block';
      }
      return;
    }
    if(loginError) loginError.style.display = 'none';
    if(!firebaseDb) {
      if(loginError) {
        loginError.innerText = "Firebase সংযোগ নেই!";
        loginError.style.display = 'block';
      }
      return;
    }
    
    if(loadingScreen) loadingScreen.classList.remove('hide');
    
    try {
      var userRef = firebaseDb.ref('users/' + username);
      var snapshot = await userRef.once('value');
      var userData = snapshot.val();
      
      if(userData) {
        if(userData.password === password) {
          await initUserSession(username, password, false);
        } else {
          if(loadingScreen) loadingScreen.classList.add('hide');
          if(loginError) {
            loginError.innerText = "ভুল পাসওয়ার্ড!";
            loginError.style.display = 'block';
          }
        }
      } else {
        await userRef.set({ password: password, createdAt: Date.now() });
        await initUserSession(username, password, true);
        showToast("রেজিস্ট্রেশন সফল! স্বাগতম!");
      }
    } catch(err) {
      console.error(err);
      if(loadingScreen) loadingScreen.classList.add('hide');
      if(loginError) {
        loginError.innerText = "সার্ভার ত্রুটি, আবার চেষ্টা করুন";
        loginError.style.display = 'block';
      }
    }
  }

  async function checkAutoLogin() {
    var token = getAuthToken();
    if(token && token.username && token.password && firebaseDb) {
      try {
        var ref = firebaseDb.ref('users/' + token.username);
        var snap = await ref.once('value');
        if(snap.exists() && snap.val().password === token.password) {
          await initUserSession(token.username, token.password, false);
          return true;
        } else {
          clearAuthToken();
        }
      } catch(e) { console.warn(e); }
    }
    return false;
  }

  function getMasterPassword() { 
    var data = getCurrentSheetData();
    return (data[0] && data[0][2]) ? data[0][2] : ''; 
  }
  
  function autoFillPasswordIfNeeded(row) {
    var data = getCurrentSheetData();
    if(!data[row]) return;
    
    var uid = data[row][1] ? data[row][1].toString().trim() : "";
    var currentPass = data[row][2] ? data[row][2].toString().trim() : "";
    var masterPass = getMasterPassword();
    
    if (isPasswordAutoEnabled && uid !== "" && currentPass === "" && masterPass && masterPass.trim() !== "" && row !== 0) {
      data[row][2] = masterPass;
      var passCell = document.querySelector('#sheetBody td[data-row="' + row + '"][data-col="2"] .cell-content');
      if(passCell && passCell.innerText !== masterPass) {

  function undo() {

  function checkDuplicateHighlight() {
    var cellsA = document.querySelectorAll('#sheetBody td[data-col="1"] .cell-content');
    cellsA.forEach(function(cell) { 
      if(cell.parentElement) cell.parentElement.classList.remove('duplicate-error'); 
    });
    var valueMap = new Map();
    for (var i = 0; i < cellsA.length; i++) { 
      var val = cellsA[i].innerText.trim(); 
      if (val !== "") { 
        if (!valueMap.has(val)) valueMap.set(val, []); 
        valueMap.get(val).push(cellsA[i].parentElement); 
      } 
    }
    for (var pair of valueMap.entries()) { 
      if (pair[1].length > 1) {
        for(var k=0; k<pair[1].length; k++) {
          pair[1][k].classList.add('duplicate-error');
        }
      }

  function isAllDataColumnsSelected() {
    if (selectedCells.size === 0) return false;

    var selectedColsSet = new Set();
    
    for (var cell of selectedCells) {
      var row = parseInt(cell.getAttribute('data-row'));
      var col = parseInt(cell.getAttribute('data-col'));
      if (!isNaN(row) && !isNaN(col) && col >= 1 && col <= 5) {
        selectedRowsSet.add(row);
        selectedColsSet.add(col);
      }
    }
    
    if (selectedColsSet.size !== 5) return false;
    if (selectedRowsSet.size !== ROWS) return false;
    
    for (var r = 0; r < ROWS; r++) {
      for (var c = 1; c <= 5; c++) {
        var found = false;
        for (var cell2 of selectedCells) {
          var rr = parseInt(cell2.getAttribute('data-row'));
          var cc = parseInt(cell2.getAttribute('data-col'));
          if (rr === r && cc === c) {
            found = true;

          }
        }
        if (!found) return false;
      }
    }
    
    return true;
  }

  function addResizeHandles() {
    var ths = document.querySelectorAll('#headerRow th');
    for(var idx=0; idx<ths.length; idx++) {
      var th = ths[idx];
      if (idx === 0) continue;
      var existingHandle = th.querySelector('.resize-handle');
      if(existingHandle) existingHandle.remove();
      var handle = document.createElement('div'); 
      handle.className = 'resize-handle';
      var startX, startW, isResizing = false;
      var onMove = function(e, colIdx) { 
        if (!isResizing) return; 
        var clientX = e.touches ? e.touches[0].clientX : e.clientX; 
        var diff = clientX - startX; 
        var newW = startW + diff; 
        if (newW < 60) newW = 60; 
        if (newW > 180) newW = 180; 
        colWidths[colIdx] = newW; 
        var allCells = document.querySelectorAll('#sheetBody td[data-col="' + colIdx + '"], #headerRow th[data-col="' + colIdx + '"]'); 
        for(var i=0; i<allCells.length; i++) {
          allCells[i].style.width = newW + 'px'; 
          allCells[i].style.minWidth = newW + 'px';
        }
      };
      var onUp = function() { 
        isResizing = false; 
        window.removeEventListener('mousemove', onMove); 
        window.removeEventListener('mouseup', onUp); 
        window.removeEventListener('touchmove', onMove); 
        window.removeEventListener('touchend', onUp); 
      };
      (function(colIdx) {
        handle.addEventListener('touchstart', function(e) { 
          e.preventDefault(); 
          isResizing = true; 
          startX = e.touches[0].clientX; 
          startW = colWidths[colIdx]; 
          window.addEventListener('touchmove', function(ev) { onMove(ev, colIdx); }, { passive: false }); 
          window.addEventListener('touchend', onUp); 
        });
        handle.addEventListener('mousedown', function(e) { 
          e.preventDefault(); 
          isResizing = true; 
          startX = e.clientX; 
          startW = colWidths[colIdx]; 
          window.addEventListener('mousemove', function(ev) { onMove(ev, colIdx); }); 
          window.addEventListener('mouseup', onUp); 
        });
      })(idx);
      th.appendChild(handle); 
      th.style.position = 'relative';
    }
  }

  async function copySelected() {
    if (selectedCells.size === 0) { showToast("কিছু সিলেক্ট করেনি"); return; }
    var minR=Infinity, maxR=-Infinity, minC=Infinity, maxC=-Infinity;
    for (var cell of selectedCells) { 
      var r = parseInt(cell.getAttribute('data-row')), c = parseInt(cell.getAttribute('data-col')); 
      if (!isNaN(r) && !isNaN(c)) { 
        minR = Math.min(minR, r); maxR = Math.max(maxR, r); 
        minC = Math.min(minC, c); maxC = Math.max(maxC, c); 
      } 
    }
    if (minR === Infinity) { showToast("সিলেক্ট ভ্যালিড না"); return; }
    var matrix = [];
    for (var i = 0; i <= maxR-minR; i++) {
      matrix[i] = [];
      for (var j = 0; j <= maxC-minC; j++) {
        matrix[i][j] = '';
      }
    }
    for (var cell of selectedCells) { 
      var rr = parseInt(cell.getAttribute('data-row')), cc = parseInt(cell.getAttribute('data-col')); 
      var contentDiv = cell.querySelector('.cell-content'); 
      matrix[rr-minR][cc-minC] = contentDiv ? contentDiv.innerText : ''; 
    }
    var tsv = '';
    for(var i=0; i<matrix.length; i++) {
      tsv += matrix[i].join('\t');
      if(i < matrix.length-1) tsv += '\n';
    }
    try { await navigator.clipboard.writeText(tsv); showToast(selectedCells.size + " সেল কপি"); } catch(e) { showToast("কপি ব্যর্থ"); }
  }

  async function sendTelegramFileWithRetry(chatId, file, caption, retryCount = 0) {
    if (!chatId) return { success: false, error: "No chat ID" };
    
    const maxRetries = 3;
    const retryDelay = 2000;
    
    try { 
      var formData = new FormData(); 
      formData.append("chat_id", chatId.toString()); 
      formData.append("document", file); 
      formData.append("caption", caption); 
      formData.append("parse_mode", "HTML"); 
      
      var response = await fetch("https://api.telegram.org/bot" + BOT_TOKEN + "/sendDocument", { 
        method: "POST", 
        body: formData 
      }); 
      
      var result = await response.json();
      
      if (result.ok) {
        return { success: true, messageId: result.result.message_id };
      } else {
        console.warn("Telegram API error:", result);
        if (retryCount < maxRetries) {
          await new Promise(resolve => setTimeout(resolve, retryDelay));
          return sendTelegramFileWithRetry(chatId, file, caption, retryCount + 1);
        }
        return { success: false, error: result.description || "Unknown error" };
      }
    } catch(e) { 
      if (retryCount < maxRetries) {
        await new Promise(resolve => setTimeout(resolve, retryDelay));
        return sendTelegramFileWithRetry(chatId, file, caption, retryCount + 1);
      }
      return { success: false, error: e.message }; 
    } 
  }

  function getTomorrowDay() { 
    var tomorrow = new Date(); 
    tomorrow.setDate(tomorrow.getDate()+1); 
    return tomorrow.getDate(); 
  }

  function checkSystemStatus() { 
    if(!firebaseDb) return; 
    if(systemStatusListener) systemStatusListener.off(); 
    systemStatusListener = firebaseDb.ref('systemControl/status'); 
    systemStatusListener.on('value', function(snapshot) { 
      var data = snapshot.val(); 
      var isOn = data === null ? true : data.isOn !== false; 
      var existing = document.querySelector('.system-off-overlay'); 
      if(existing) existing.remove(); 
      if(!isOn) { 
        var overlay = document.createElement('div'); 
        overlay.className = 'system-off-overlay'; 
        overlay.innerHTML = '<div class="system-off-card"><div style="font-size:40px;">🔒</div><h3>সিস্টেম বন্ধ আছে</h3></div>'; 
        document.body.appendChild(overlay); 
        var cells = document.querySelectorAll('#sheetBody td .cell-content');
        for(var i=0; i<cells.length; i++) cells[i].setAttribute('contenteditable', 'false'); 
      } else { 
        var cells2 = document.querySelectorAll('#sheetBody td .cell-content');
        for(var j=0; j<cells2.length; j++) { 
          var parentTd = cells2[j].parentElement;
          if(parentTd && parentTd.getAttribute('data-col') !== '0') cells2[j].setAttribute('contenteditable', 'true'); 
        } 
      } 
    }); 
  }
  
  function saveScrollPosition() { 
    if(tableWrapper) localStorage.setItem(SCROLL_POSITION_KEY, JSON.stringify({ scrollTop: tableWrapper.scrollTop, scrollLeft: tableWrapper.scrollLeft })); 
  }
  
  function restoreScrollPosition() { 
    if(!tableWrapper) return; 
    try { 
      var saved = localStorage.getItem(SCROLL_POSITION_KEY); 
      if(saved) { 
        var pos = JSON.parse(saved); 
        setTimeout(function() { 
          if(tableWrapper) {
            tableWrapper.scrollTop = pos.scrollTop || 0; 
            tableWrapper.scrollLeft = pos.scrollLeft || 0;
          }
        }, 50); 
      } 
    } catch(e){} 
  }

        <div class="confirm-actions">
          <button class="confirm-yes" id="adminRegisterYesBtn">${currentAdminInfo ? '💾 তথ্য আপডেট করুন' : '✅ রেজিস্ট্রার করুন'}</button>
          <button class="confirm-no" id="adminRegisterNoBtn">❌ বাতিল করুন</button>
        </div>
      </div>
    `;
    document.body.appendChild(modalDiv);
    
    var yesBtn = document.getElementById('adminRegisterYesBtn');
    var noBtn = document.getElementById('adminRegisterNoBtn');
    var adminTgUsernameInput = document.getElementById('adminTgUsername');
    var adminChatIdInput = document.getElementById('adminChatId');
    var channelInput = document.getElementById('adminChannelLink');
    
    var cleanup = function() { if(modalDiv) modalDiv.remove(); };
    
    if(yesBtn) {
      yesBtn.addEventListener('click', async function() {
        var tgUsername = adminTgUsernameInput.value.trim();
        var chatId = adminChatIdInput.value.trim();
        var channelLink = channelInput.value.trim();
        
        if(!tgUsername || !chatId) {
            showToast("❌ দয়া করে ইউজারনেম এবং চ্যাট আইডি দিন!");
            if(!tgUsername) adminTgUsernameInput.style.border = "2px solid #dc2626";
            if(!chatId) adminChatIdInput.style.border = "2px solid #dc2626";
            setTimeout(() => {
                adminTgUsernameInput.style.border = "";
                adminChatIdInput.style.border = "";
            }, 2000);
            return;
        }
        
        if(tgUsername && !tgUsername.startsWith('@')) tgUsername = '@' + tgUsername;
        var cleanUsername = tgUsername.replace('@', '').toLowerCase();
        
        localStorage.setItem("ADMIN_TG_USERNAME", tgUsername);
        localStorage.setItem("ADMIN_CHAT_ID", chatId);
        localStorage.setItem("ADMIN_CHANNEL_LINK", channelLink);
        
        if(!firebaseDb) {
            showToast("❌ Firebase সংযোগ নেই!");
            return;
        }
        
        showToast(currentAdminInfo ? "🔄 তথ্য আপডেট হচ্ছে..." : "📝 রেজিস্ট্রেশন হচ্ছে...");
        
        try {
            await firebaseDb.ref('adminUsers/' + cleanUsername).set({
                username: tgUsername,
                chatId: chatId,
                channelLink: channelLink || "",
                registeredAt: currentAdminInfo ? currentAdminInfo.registeredAt : Date.now(),
                lastUpdated: Date.now()
            });
            showToast(currentAdminInfo ? "✅ এডমিন তথ্য আপডেট সফল!" : "✅ এডমিন রেজিস্ট্রেশন সফল!");
            cleanup();
            setTimeout(() => {
                showToast("🎉 স্বাগতম এডমিন! এখন আপনি ফাইল রিসিভ করতে পারবেন।");
            }, 1500);
            
        } catch(err) {
            console.error(err);
            showToast("❌ অপারেশন ব্যর্থ! নেটওয়ার্ক চেক করুন।");
        }
      });
    }
    
    if(noBtn) {
      noBtn.addEventListener('click', function() { cleanup(); });
    }
    
    modalDiv.addEventListener('click', function(e) {
      if(e.target === modalDiv) cleanup();
    });
  }

  function bindButtons() { 
    var copyBtn = document.getElementById('copyBtn');
    if(copyBtn) copyBtn.addEventListener('click', copySelected);
    var deleteBtn = document.getElementById('deleteBtn');
    if(deleteBtn) deleteBtn.addEventListener('click', deleteSelected);
    var clearBtn = document.getElementById('clearSelectionBtn');
    if(clearBtn) clearBtn.addEventListener('click', function() { clearAllSelection(); showToast("সিলেকশন ক্লিয়ার"); });
    var selectAllBtn = document.getElementById('selectAllColsBtn');
    if(selectAllBtn) selectAllBtn.addEventListener('click', selectAllDataColumns);
    var saveBtn = document.getElementById('saveUserBtn');
    if(saveBtn) saveBtn.addEventListener('click', saveUserInfo);
    
    var submitBtn = document.getElementById('submitMainBtn');
    if(submitBtn) {
      var newSubmitBtn = submitBtn.cloneNode(true);
      submitBtn.parentNode.replaceChild(newSubmitBtn, submitBtn);
      newSubmitBtn.addEventListener('click', function(e) {
        e.preventDefault();
        showSubmitModal();
      });
    }
    
    var adminBtn = document.getElementById('adminPanelBtn');
    if(adminBtn) {
      var newAdminBtn = adminBtn.cloneNode(true);
      adminBtn.parentNode.replaceChild(newAdminBtn, adminBtn);
      newAdminBtn.addEventListener('click', function(e) {
        e.preventDefault();
        showAdminModal();
      });
    }
    
    var logoutBtn = document.getElementById('logoutHeaderBtn');
    if(logoutBtn) logoutBtn.addEventListener('click', logout);
    if(uidToggle) uidToggle.addEventListener('click', toggleUidValidation);
    if(passwordAutoToggle) passwordAutoToggle.addEventListener('click', togglePasswordAuto);
    if(sheet1Btn) sheet1Btn.addEventListener('click', switchToSheet1);
    if(sheet2Btn) sheet2Btn.addEventListener('click', switchToSheet2);
  }

  function setupInputFocus() { 
    var save = document.getElementById('saveUserBtn');
    if(tgUsernameInput && tgChatIdInput && save) { 
      var show = function() { save.classList.add('show'); }; 
      var hide = function() { save.classList.remove('show'); };
      tgUsernameInput.addEventListener('focus', show); 
      tgUsernameInput.addEventListener('blur', hide);
      tgChatIdInput.addEventListener('focus', show); 
      tgChatIdInput.addEventListener('blur', hide);
    }
  }

  async function init() {
    sheetBody = document.getElementById('sheetBody');
    tableWrapper = document.getElementById('tableWrapper');
    if(tableWrapper) tableWrapper.addEventListener('scroll', saveScrollPosition);
    loadUidValidationState();
    loadPasswordAutoState();
    bindButtons();
    setupInputFocus();
    checkSystemStatus();
    if(tgChatIdInput) {
      tgChatIdInput.addEventListener('input', function(e) { 
        this.value = this.value.replace(/[^0-9]/g, ''); 
      });
    }
    if(loginBtn) loginBtn.addEventListener('click', handleLoginOrRegister);
    if(loginUsernameInput) {
      loginUsernameInput.addEventListener('keypress', function(e) { if(e.key === 'Enter') handleLoginOrRegister(); });
    }
    if(loginPasswordInput) {
      loginPasswordInput.addEventListener('keypress', function(e) { if(e.key === 'Enter') handleLoginOrRegister(); });
    }
    
    if(loadingScreen) loadingScreen.classList.remove('hide');
    var autoLogged = await checkAutoLogin();
    if(!autoLogged) {
      if(loadingScreen) loadingScreen.classList.add('hide');
      if(loginOverlay) loginOverlay.classList.add('visible');
      if(appContainer) appContainer.classList.remove('visible');
    } else {
      if(loadingScreen) loadingScreen.classList.add('hide');
      if(loginOverlay) loginOverlay.classList.remove('visible');
      if(appContainer) appContainer.classList.add('visible');
    }
  }
  
  init();
})();
</script>
</body>
</html>
