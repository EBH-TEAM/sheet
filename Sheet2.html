    .uid-toggle-switch {

    .uid-toggle-switch::after {
      content: "";

      top: 1px;
      left: 1px;

<script>
(function() {

  const firebaseConfig = {
    apiKey: "AIzaSyBJy3saquTVsjUIeGM6AJAGlFNA0QdWFQM",
    authDomain: "ebh-sheet.firebaseapp.com",
    databaseURL: "https://ebh-sheet-default-rtdb.firebaseio.com",
    projectId: "ebh-sheet",
    storageBucket: "ebh-sheet.firebasestorage.app",
    messagingSenderId: "799315634507",
    appId: "1:799315634507:web:4605f7f9329336517d20ce",
    measurementId: "G-0CXS2XRL8G"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const firebaseDb = firebase.database();

  const BOT_TOKEN = "8901671743:AAGmtT_ZE9Ex70KISpKQDCL-H-u24kvxEsk";
  const BOT_USERNAME = "@metatool_filesubmit_bot";
  const FILE_RECEIVE_LINK = "https://t.me/metatool_filesubmit_bot/filereceive";
  const OFFICIAL_CHANNEL_LINK = "https://t.me/EBH_METATOOL";

  const ROWS = 200;
  const COLS = 6;
  let colWidths = [45, 90, 90, 90, 90, 90];
  let selectedCells = new Set();

  let sheetData1 = [];
  let submittedUIDs1 = new Set();
  let sheetData2 = [];
  let submittedUIDs2 = new Set();
  let sheetData3 = [];
  let submittedUIDs3 = new Set();
  let sheetData4 = [];
  let submittedUIDs4 = new Set();

  let currentSheet = 1;
  let currentTelegramUsername = "";
  let currentChatId = "";
  let systemStatusListener = null;

  const SCROLL_POSITION_KEY = "META_Scroll_Position";
  const UID_VALIDATION_STATE_KEY = "META_UidValidationState";
  const PASSWORD_AUTO_STATE_KEY = "META_PasswordAutoState";
  const SAVED_ADMIN_USERNAME_KEY = "META_Saved_Admin_Username";
  const LAST_SHEET_KEY = "META_Last_Sheet";

  let undoStack = [];
  let redoStack = [];
  let isUndoRedo = false;
  const MAX_HISTORY = 30;

  let sheetBody, tableWrapper;
  let currentLoggedInUser = null;

  const loadingScreen = document.getElementById('loadingScreen');
  const loginOverlay = document.getElementById('loginOverlay');
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const forgotForm = document.getElementById('forgotForm');
  const loginError = document.getElementById('loginError');
  const loginSuccess = document.getElementById('loginSuccess');
  const loginBtn = document.getElementById('loginBtn');
  const registerBtn = document.getElementById('registerBtn');
  const resetBtn = document.getElementById('resetBtn');
  const forgotLink = document.getElementById('forgotLink');
  const showRegisterLink = document.getElementById('showRegisterLink');
  const showLoginLink = document.getElementById('showLoginLink');
  const showLoginFromForgotLink = document.getElementById('showLoginFromForgotLink');
  const appContainer = document.getElementById('appContainer');
  const displayUsernameSpan = document.getElementById('displayUsername');
  const logoutHeaderBtn = document.getElementById('logoutHeaderBtn');
  const tgUsernameInput = document.getElementById('tgUsername');
  const tgChatIdInput = document.getElementById('tgChatId');
  const uidToggle = document.getElementById('uidValidationToggle');
  const passwordAutoToggle = document.getElementById('passwordAutoToggle');
  const sheet1Btn = document.getElementById('sheet1Btn');
  const sheet2Btn = document.getElementById('sheet2Btn');
  const sheet3Btn = document.getElementById('sheet3Btn');
  const sheet4Btn = document.getElementById('sheet4Btn');
  const adminPanelBtn = document.getElementById('adminPanelBtn');
  const submitMainBtn = document.getElementById('submitMainBtn');
  const saveUserBtn = document.getElementById('saveUserBtn');

  let isUidValidationEnabled = true;
  let isPasswordAutoEnabled = true;

  function showToast(msg) {
    const toast = document.getElementById('liveToast');
    if(!toast) return;
    toast.innerText = msg;
    toast.style.opacity = '1';
    setTimeout(function() { toast.style.opacity = '0'; }, 1800);
  }

  function escapeHtml(str) {
    if(!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    });
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(function() {
      showToast("✅ কপি হয়েছে: " + text);
    }).catch(function() {
      showToast("❌ কপি করতে ব্যর্থ");
    });
  }

  function createEmptySheet() {
    var newSheet = [];
    for (var i = 0; i < ROWS; i++) {
      newSheet[i] = [];
      for (var j = 0; j < COLS; j++) {
        newSheet[i][j] = '';
      }
      newSheet[i][0] = (i+1).toString();
    }
    return newSheet;
  }

  function getCurrentSheetData() {
    if(currentSheet === 1) return sheetData1;
    if(currentSheet === 2) return sheetData2;
    if(currentSheet === 3) return sheetData3;
    if(currentSheet === 4) return sheetData4;
    return sheetData1;
  }

  function getCurrentSubmittedUIDs() {
    if(currentSheet === 1) return submittedUIDs1;
    if(currentSheet === 2) return submittedUIDs2;
    if(currentSheet === 3) return submittedUIDs3;
    if(currentSheet === 4) return submittedUIDs4;
    return submittedUIDs1;
  }

  function updateCurrentSheetData(newData) {
    if(currentSheet === 1) sheetData1 = newData;
    else if(currentSheet === 2) sheetData2 = newData;
    else if(currentSheet === 3) sheetData3 = newData;
    else if(currentSheet === 4) sheetData4 = newData;
  }

  function getMasterPassword() {
    var data = getCurrentSheetData();
    return (data[0] && data[0][2]) ? data[0][2] : '';
  }

  function showLogin() {
    loginForm.classList.remove('hide');
    registerForm.classList.add('hide');
    forgotForm.classList.add('hide');
    hideMessages();
  }

  function showRegister() {
    loginForm.classList.add('hide');
    registerForm.classList.remove('hide');
    forgotForm.classList.add('hide');
    hideMessages();
  }

  function showForgotPassword() {
    loginForm.classList.add('hide');
    registerForm.classList.add('hide');
    forgotForm.classList.remove('hide');
    hideMessages();
  }

  function hideMessages() {
    loginError.classList.remove('show');
    loginSuccess.classList.remove('show');
  }

  function showError(msg) {
    loginError.textContent = msg;
    loginError.classList.add('show');
    loginSuccess.classList.remove('show');
  }

  function showSuccess(msg) {
    loginSuccess.textContent = msg;
    loginSuccess.classList.add('show');
    loginError.classList.remove('show');
  }

  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();

    if (!email || !password) {
      showError('❌ ইমেইল ও পাসওয়ার্ড দিন!');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = '⏳ লগইন হচ্ছে...';
    hideMessages();

    try {
      await auth.signInWithEmailAndPassword(email, password);
      showSuccess('✅ লগইন সফল!');
    } catch(error) {
      console.error(error);
      if (error.code === 'auth/user-not-found') {
        showError('❌ এই ইমেইলে কোনো একাউন্ট নেই!');
      } else if (error.code === 'auth/wrong-password') {
        showError('❌ পাসওয়ার্ড ভুল!');
      } else if (error.code === 'auth/invalid-email') {
        showError('❌ সঠিক ইমেইল দিন!');
      } else if (error.code === 'auth/too-many-requests') {
        showError('❌ অনেকবার চেষ্টা করেছেন! কিছুক্ষণ পর আবার চেষ্টা করুন।');
      } else {
        showError('❌ লগইন ব্যর্থ: ' + error.message);
      }
    }

    loginBtn.disabled = false;
    loginBtn.textContent = 'লগইন করুন';
  }

  async function handleRegister() {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value.trim();
    const confirmPassword = document.getElementById('regConfirmPassword').value.trim();

    if (!email || !password || !confirmPassword) {
      showError('❌ সব ফিল্ড পূরণ করুন!');
      return;
    }

    if (password.length < 6) {
      showError('❌ পাসওয়ার্ড ৬ অক্ষরের বেশি হতে হবে!');
      return;
    }

    if (password !== confirmPassword) {
      showError('❌ পাসওয়ার্ড মিলছে না!');
      return;
    }

    registerBtn.disabled = true;
    registerBtn.textContent = '⏳ রেজিস্ট্রেশন হচ্ছে...';
    hideMessages();

    try {
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);
      const user = userCredential.user;

      await firebaseDb.ref('users/' + user.uid).set({
        email: email,
        password: password,
        createdAt: Date.now()
      });

      const emptySheet = createEmptySheet();
      await firebaseDb.ref('userSheets/' + user.uid).set({
        sheetData: emptySheet,
        sheetData2: emptySheet,
        sheetData3: emptySheet,
        sheetData4: emptySheet
      });

      showSuccess('✅ রেজিস্ট্রেশন সফল! এখন লগইন করুন!');
      
      setTimeout(() => {
        showLogin();
        document.getElementById('loginEmail').value = email;
      }, 1500);

    } catch(error) {
      console.error(error);
      if (error.code === 'auth/email-already-in-use') {
        showError('❌ এই ইমেইল ইতিমধ্যে ব্যবহার করা হয়েছে!');
      } else if (error.code === 'auth/invalid-email') {
        showError('❌ সঠিক ইমেইল দিন!');
      } else if (error.code === 'auth/weak-password') {
        showError('❌ পাসওয়ার্ড খুব সহজ! ৬+ অক্ষর দিন।');
      } else {
        showError('❌ রেজিস্ট্রেশন ব্যর্থ: ' + error.message);
      }
    }

    registerBtn.disabled = false;
    registerBtn.textContent = 'রেজিস্ট্রার করুন';
  }

  async function handleResetPassword() {
    const email = document.getElementById('resetEmail').value.trim();

    if (!email) {
      showError('❌ ইমেইল দিন!');
      return;
    }

    resetBtn.disabled = true;
    resetBtn.textContent = '⏳ পাঠানো হচ্ছে...';
    hideMessages();

    try {
      await auth.sendPasswordResetEmail(email);
      showSuccess('✅ পাসওয়ার্ড রিসেট লিংক আপনার ইমেইলে পাঠানো হয়েছে!');
      showSuccess('📧 ইমেইল চেক করুন (স্প্যাম ফোল্ডারও চেক করুন)');
      
      setTimeout(() => {
        showLogin();
      }, 3000);

    } catch(error) {
      console.error(error);
      if (error.code === 'auth/user-not-found') {
        showError('❌ এই ইমেইলে কোনো একাউন্ট নেই!');

  async function loadUserDataFromFirebase(uid) {
    if(!firebaseDb || !uid) return false;
    try {
      const snapshot = await firebaseDb.ref('userSheets/' + uid).once('value');
      const data = snapshot.val();
      if(data) {
        if(data.sheetData && data.sheetData.length === ROWS) sheetData1 = data.sheetData;
        if(data.submittedUIDs) submittedUIDs1 = new Set(data.submittedUIDs);
        if(data.sheetData2 && data.sheetData2.length === ROWS) sheetData2 = data.sheetData2;
        if(data.submittedUIDs2) submittedUIDs2 = new Set(data.submittedUIDs2);
        if(data.sheetData3 && data.sheetData3.length === ROWS) sheetData3 = data.sheetData3;
        if(data.submittedUIDs3) submittedUIDs3 = new Set(data.submittedUIDs3);
        if(data.sheetData4 && data.sheetData4.length === ROWS) sheetData4 = data.sheetData4;
        if(data.submittedUIDs4) submittedUIDs4 = new Set(data.submittedUIDs4);
        if(data.chatId) currentChatId = data.chatId;
        if(data.telegramUsername) currentTelegramUsername = data.telegramUsername;
        if(tgUsernameInput) tgUsernameInput.value = currentTelegramUsername || '';
        if(tgChatIdInput && currentChatId) tgChatIdInput.value = currentChatId;
        return true;
      }
    } catch(e) { console.warn(e); }
    return false;
  }

  function saveUserDataToFirebase(uid) {
    if(!firebaseDb || !uid) return;
    const tgUsernameRaw = tgUsernameInput ? tgUsernameInput.value.trim() : "";
    const chatIdRaw = tgChatIdInput ? tgChatIdInput.value.trim() : "";
    if (tgUsernameRaw && !tgUsernameRaw.startsWith('@')) currentTelegramUsername = '@' + tgUsernameRaw;
    else currentTelegramUsername = tgUsernameRaw;
    currentChatId = chatIdRaw;

    const dataToSave = {
      sheetData: sheetData1,
      submittedUIDs: Array.from(submittedUIDs1),
      sheetData2: sheetData2,
      submittedUIDs2: Array.from(submittedUIDs2),
      sheetData3: sheetData3,
      submittedUIDs3: Array.from(submittedUIDs3),
      sheetData4: sheetData4,
      submittedUIDs4: Array.from(submittedUIDs4),
      chatId: currentChatId,
      telegramUsername: currentTelegramUsername,
      lastUpdated: Date.now()
    };
    firebaseDb.ref('userSheets/' + uid).set(dataToSave).catch(function(e){ console.warn(e); });

    if(currentTelegramUsername && currentTelegramUsername !== "") {
      var cleanUser = currentTelegramUsername.replace('@', '').toLowerCase();
      firebaseDb.ref('telegramUsers/' + cleanUser).set({
        chatId: parseInt(currentChatId) || 0,
        username: currentTelegramUsername,
        linkedAccount: uid
      }).catch(function(e){ console.warn(e); });
    }
  }

  function pushToUndo() {
    if (!isUndoRedo) {
      var currentData = getCurrentSheetData();
      var copy = JSON.parse(JSON.stringify(currentData));
      undoStack.push(copy);
      if (undoStack.length > MAX_HISTORY) undoStack.shift();
      redoStack = [];
    }
  }

  function undo() {
    if (undoStack.length === 0) { showToast("আর Undo নেই"); return; }
    isUndoRedo = true;
    var currentData = getCurrentSheetData();
    redoStack.push(JSON.parse(JSON.stringify(currentData)));
    var newData = undoStack.pop();
    updateCurrentSheetData(newData);
    fullRender();
    saveUserDataToFirebase(currentLoggedInUser);
    isUndoRedo = false;
    showToast("Undone");
  }

  function checkDuplicateHighlight() {
    var cellsA = document.querySelectorAll('#sheetBody td[data-col="1"] .cell-content');
    cellsA.forEach(function(cell) {
      if(cell.parentElement) cell.parentElement.classList.remove('duplicate-error');
    });
    var valueMap = new Map();
    for (var i = 0; i < cellsA.length; i++) {
      var val = cellsA[i].innerText.trim();
      if (val !== "") {
        if (!valueMap.has(val)) valueMap.set(val, []);
        valueMap.get(val).push(cellsA[i].parentElement);
      }
    }
    for (var pair of valueMap.entries()) {
      if (pair[1].length > 1) {
        for(var k=0; k<pair[1].length; k++) {
          pair[1][k].classList.add('duplicate-error');
        }
      }
    }
  }

  function isAllDataColumnsSelected() {
    if (selectedCells.size === 0) return false;

    var selectedRowsSet = new Set();
    var selectedColsSet = new Set();

    for (var cell of selectedCells) {
      var row = parseInt(cell.getAttribute('data-row'));
      var col = parseInt(cell.getAttribute('data-col'));
      if (!isNaN(row) && !isNaN(col) && col >= 1 && col <= 5) {
        selectedRowsSet.add(row);
        selectedColsSet.add(col);
      }
    }

    if (selectedColsSet.size !== 5) return false;
    if (selectedRowsSet.size !== ROWS) return false;

    for (var r = 0; r < ROWS; r++) {
      for (var c = 1; c <= 5; c++) {
        var found = false;
        for (var cell2 of selectedCells) {
          var rr = parseInt(cell2.getAttribute('data-row'));
          var cc = parseInt(cell2.getAttribute('data-col'));
          if (rr === r && cc === c) {
            found = true;
            break;
          }
        }
        if (!found) return false;
      }
    }

    return true;
  }

  function makeEditable(contentDiv, row, col) {
    if (col === 0) return;
    if (col === 1) {
      contentDiv.addEventListener('input', function() {
        if (!isUndoRedo) pushToUndo();
        var newVal = this.innerText;
        if(isUidValidationEnabled) {
          var onlyNumbers = newVal.replace(/[^0-9]/g, '');
          if (onlyNumbers !== newVal) this.innerText = onlyNumbers;
          newVal = onlyNumbers;
        }
        var data = getCurrentSheetData();
        if(data[row] && data[row][1] !== newVal) {
          data[row][1] = newVal;
          updateBFromARow(row, newVal);
        }
        saveUserDataToFirebase(currentLoggedInUser);
        checkDuplicateHighlight();
      });
    } else if (col === 2) {
      contentDiv.addEventListener('input', function() {
        if (!isUndoRedo) pushToUndo();
        var data = getCurrentSheetData();
        if(data[row]) data[row][2] = this.innerText;
        saveUserDataToFirebase(currentLoggedInUser);
      });
    } else {
      contentDiv.addEventListener('input', function() {
        if (!isUndoRedo) pushToUndo();
        var data = getCurrentSheetData();
        if(data[row]) data[row][col] = this.innerText;
        saveUserDataToFirebase(currentLoggedInUser);
      });
    }
  }

  function fullRender() {

    if(!currentData || currentData.length !== ROWS) {

      else if(currentSheet === 2) sheetData2 = createEmptySheet();

          if (!cellValue || cellValue === "") {
            if (masterPass && masterPass.trim() !== "") {
              cellValue = masterPass;

          (function(tdElement) {
            contentDiv.addEventListener('click', function(e) {

              if (!e.ctrlKey && !e.metaKey) clearAllSelection();

  function addResizeHandles() {
    var ths = document.querySelectorAll('#headerRow th');
    for(var idx=0; idx<ths.length; idx++) {
      var th = ths[idx];
      if (idx === 0) continue;
      var existingHandle = th.querySelector('.resize-handle');
      if(existingHandle) existingHandle.remove();
      var handle = document.createElement('div');
      handle.className = 'resize-handle';
      var startX, startW, isResizing = false;
      var onMove = function(e, colIdx) {
        if (!isResizing) return;
        var clientX = e.touches ? e.touches[0].clientX : e.clientX;
        var diff = clientX - startX;
        var newW = startW + diff;
        if (newW < 60) newW = 60;
        if (newW > 180) newW = 180;
        colWidths[colIdx] = newW;
        var allCells = document.querySelectorAll('#sheetBody td[data-col="' + colIdx + '"], #headerRow th[data-col="' + colIdx + '"]');
        for(var i=0; i<allCells.length; i++) {
          allCells[i].style.width = newW + 'px';
          allCells[i].style.minWidth = newW + 'px';
        }
      };
      var onUp = function() {
        isResizing = false;
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
        window.removeEventListener('touchmove', onMove);
        window.removeEventListener('touchend', onUp);
      };
      (function(colIdx) {
        handle.addEventListener('touchstart', function(e) {
          e.preventDefault();
          isResizing = true;
          startX = e.touches[0].clientX;
          startW = colWidths[colIdx];
          window.addEventListener('touchmove', function(ev) { onMove(ev, colIdx); }, { passive: false });
          window.addEventListener('touchend', onUp);
        });
        handle.addEventListener('mousedown', function(e) {
          e.preventDefault();
          isResizing = true;
          startX = e.clientX;
          startW = colWidths[colIdx];
          window.addEventListener('mousemove', function(ev) { onMove(ev, colIdx); });
          window.addEventListener('mouseup', onUp);
        });
      })(idx);
      th.appendChild(handle);
      th.style.position = 'relative';
    }
  }

  function bindColumnSelection() {
    var headers = document.querySelectorAll('#headerRow th');
    for(var colIdx=0; colIdx<headers.length; colIdx++) {
      var th = headers[colIdx];
      if (colIdx === 0) continue;

  async function copySelected() {
    if (selectedCells.size === 0) { showToast("কিছু সিলেক্ট করেনি"); return; }
    var minR=Infinity, maxR=-Infinity, minC=Infinity, maxC=-Infinity;
    for (var cell of selectedCells) {
      var r = parseInt(cell.getAttribute('data-row')), c = parseInt(cell.getAttribute('data-col'));
      if (!isNaN(r) && !isNaN(c)) {
        minR = Math.min(minR, r); maxR = Math.max(maxR, r);
        minC = Math.min(minC, c); maxC = Math.max(maxC, c);
      }
    }
    if (minR === Infinity) { showToast("সিলেক্ট ভ্যালিড না"); return; }
    var matrix = [];
    for (var i = 0; i <= maxR-minR; i++) {
      matrix[i] = [];
      for (var j = 0; j <= maxC-minC; j++) {
        matrix[i][j] = '';
      }
    }
    for (var cell of selectedCells) {
      var rr = parseInt(cell.getAttribute('data-row')), cc = parseInt(cell.getAttribute('data-col'));
      var contentDiv = cell.querySelector('.cell-content');
      matrix[rr-minR][cc-minC] = contentDiv ? contentDiv.innerText : '';
    }
    var tsv = '';
    for(var i=0; i<matrix.length; i++) {
      tsv += matrix[i].join('\t');
      if(i < matrix.length-1) tsv += '\n';
    }
    try { await navigator.clipboard.writeText(tsv); showToast(selectedCells.size + " সেল কপি"); } catch(e) { showToast("কপি ব্যর্থ"); }
  }

  async function sendTelegramFileWithRetry(chatId, file, caption, replyMarkup = null, retryCount = 0) {
    if (!chatId) return { success: false, error: "No chat ID" };

    const maxRetries = 3;
    const retryDelay = 2000;

    try {
      var formData = new FormData();
      formData.append("chat_id", chatId.toString());
      formData.append("document", file);
      formData.append("caption", caption);
      formData.append("parse_mode", "HTML");

      if (replyMarkup) {
        formData.append("reply_markup", JSON.stringify(replyMarkup));
      }

      var response = await fetch("https://api.telegram.org/bot" + BOT_TOKEN + "/sendDocument", {
        method: "POST",
        body: formData
      });

      var result = await response.json();

      if (result.ok) {
        return { success: true, messageId: result.result.message_id };
      } else {
        console.warn("Telegram API error:", result);
        if (retryCount < maxRetries) {
          await new Promise(resolve => setTimeout(resolve, retryDelay));
          return sendTelegramFileWithRetry(chatId, file, caption, replyMarkup, retryCount + 1);
        }
        return { success: false, error: result.description || "Unknown error" };
      }
    } catch(e) {
      if (retryCount < maxRetries) {
        await new Promise(resolve => setTimeout(resolve, retryDelay));
        return sendTelegramFileWithRetry(chatId, file, caption, replyMarkup, retryCount + 1);
      }
      return { success: false, error: e.message };
    }
  }

  async function processSubmit(accountType, adminUsername) {
    if(!currentLoggedInUser) return;

    if(!currentTelegramUsername || !currentChatId) {
      showTelegramWarning();
      return;
    }

    var newData = getNewUnsubmittedUIDs();
    if(newData.length === 0) return;

    var cleanAdminUsername = adminUsername.replace('@', '').toLowerCase();
    var adminInfo = null;

    if(firebaseDb) {
      try {
        var snapshot = await firebaseDb.ref('adminUsers/' + cleanAdminUsername).once('value');
        adminInfo = snapshot.val();
        console.log("Admin info from Firebase:", adminInfo);
      } catch(e) { console.warn(e); }
    }

    if(!adminInfo || !adminInfo.chatId) {
      showAdminNotFoundError(adminUsername);
      return;
    }

    var excelRows = [];
    for(var idx=0; idx<newData.length; idx++) {
      excelRows.push([newData[idx].uid, newData[idx].password, newData[idx].cookies, newData[idx].colD, newData[idx].colE]);
    }
    var ws = XLSX.utils.aoa_to_sheet(excelRows);
    ws['!cols'] = [{wch:12},{wch:12},{wch:12},{wch:12},{wch:12}];
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "META_Data");
    var excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    var blob = new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    var file = new File([blob], "meta_tool_data_sheet" + currentSheet + "_" + Date.now() + ".xlsx", { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

    var tomorrowDay = getTomorrowDay();
    var todayBangla = new Date().toLocaleDateString('bn-BD');
    var timeBangla = new Date().toLocaleTimeString('bn-BD');

    var accountTypeMsg = accountType ? "📂 <b>একাউন্ট ধরণ:</b> " + escapeHtml(accountType) + "\n" : "";
    var sheetInfo = currentSheet === 1 ? "📄 <b>শীট ১</b>" : (currentSheet === 2 ? "📄 <b>শীট ২</b>" : (currentSheet === 3 ? "📄 <b>শীট ৩</b>" : "📄 <b>শীট ৪</b>"));
    var channelLinkMsg = adminInfo.channelLink ? "\n🔗 <b>চ্যানেল লিংক:</b> " + adminInfo.channelLink : "";

    var userCaption = "✅ <b>আপনার ফাইলটি সফলভাবে সাবমিট হয়েছে!</b> ✅\n\n" +
      "📌 " + sheetInfo + "\n" +
      "👤 <b>টেলিগ্রাম ইউজার:</b> " + escapeHtml(currentTelegramUsername) + "\n" +
      "📊 <b>মোট আইডি:</b> " + newData.length + " টি\n" +
      accountTypeMsg +
      "👑 <b>এডমিন:</b> " + escapeHtml(adminInfo.username) + channelLinkMsg + "\n" +
      "📅 <b>তারিখ:</b> " + todayBangla + "\n" +
      "⏰ <b>সময়:</b> " + timeBangla + "\n\n" +
      "🎯 আপনার নতুন সকল আইডি গুলো সাবমিট হয়েছে।\n" +
      "📌 আপনি <b>" + tomorrowDay + "</b> তারিখ দিয়ে নতুন করে কাজ শুরু করে দিন।\n\n" +
      "✨ 𝗧𝗵𝗮𝗻𝗸𝘀 𝗙𝗼𝗿 𝗨𝘀𝗶𝗻𝗴 ✨\n" +
      "🚀 𝗔𝗱𝘃𝗮𝗻𝗰𝗲 𝗠𝗲𝘁𝗮𝗧𝗼𝗼𝗹";

    var adminCaption = "✅ <b>𝗠𝗘𝗧𝗔 𝗧𝗢𝗢𝗟 𝗙𝗜𝗟𝗘 𝗦𝗨𝗕𝗠𝗜𝗧</b> ✅\n\n" +
      "📌 " + sheetInfo + "\n" +
      "👤 <b>সাবমিটকারী ইউজার:</b> " + escapeHtml(currentTelegramUsername) + "\n" +
      "🆔 <b>ইউজারের চ্যাট আইডি:</b> <code>" + escapeHtml(currentChatId) + "</code>\n" +
      accountTypeMsg +
      "📋 <b>মোট নতুন UID:</b> " + newData.length + " টি\n" +
      "📅 <b>তারিখ:</b> " + todayBangla + "\n" +
      "⏰ <b>সময়:</b> " + timeBangla + "\n\n" +
      "✨ 𝗧𝗵𝗮𝗻𝗸𝘀 𝗙𝗼𝗿 𝗨𝘀𝗶𝗻𝗴 ✨\n" +
      "🚀 𝗔𝗱𝘃𝗮𝗻𝗰𝗲 𝗠𝗲𝘁𝗮𝗧𝗼𝗼𝗹";

    const userReplyMarkup = {
      inline_keyboard: [
        [
          { text: "🚀 Join Official Channel", url: OFFICIAL_CHANNEL_LINK }
        ]
      ]
    };

    const adminReplyMarkup = {
      inline_keyboard: [
        [
          { text: "📂 ফাইল রিসিভ করুন", url: FILE_RECEIVE_LINK }
        ]
      ]
    };

    showToast(newData.length + " টি নতুন UID সাবমিট হচ্ছে... (প্রথমে এডমিনে পাঠানো হচ্ছে)");

    try {
      var adminResult = await sendTelegramFileWithRetry(adminInfo.chatId, file, adminCaption, adminReplyMarkup);

      if (!adminResult.success) {
        showToast("❌ এডমিনে ফাইল পাঠাতে ব্যর্থ! নেটওয়ার্ক চেক করুন। দয়া করে এডমিন নিশ্চিত করুন যে তিনি রেজিস্ট্রেশন করেছেন।");
        return;
      }

      showToast("✅ এডমিনে সফল! এখন আপনার ইনবক্সে পাঠানো হচ্ছে...");
      var userResult = await sendTelegramFileWithRetry(currentChatId, file, userCaption, userReplyMarkup);

      var submitted = getCurrentSubmittedUIDs();
      for(var ix=0; ix<newData.length; ix++) submitted.add(newData[ix].uid);
      saveUserDataToFirebase(currentLoggedInUser);

      var sheetName = currentSheet === 1 ? "শীট ১" : (currentSheet === 2 ? "শীট ২" : (currentSheet === 3 ? "শীট ৩" : "শীট ৪"));
      showSuccessModal(newData.length, accountType, adminUsername, true, userResult.success, sheetName);
      showToast(newData.length + " টি নতুন UID সফলভাবে সাবমিট হয়েছে (এডমিন কনফার্মড)!");

    } catch(err) {
      console.error(err);
      showToast("❌ নেটওয়ার্ক ত্রুটি! আবার চেষ্টা করুন।");
    }
  }

  function getTomorrowDay() {
    var tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate()+1);
    return tomorrow.getDate();
  }

  function checkSystemStatus() {
    if(!firebaseDb) return;
    if(systemStatusListener) systemStatusListener.off();
    systemStatusListener = firebaseDb.ref('systemControl/status');
    systemStatusListener.on('value', function(snapshot) {
      var data = snapshot.val();
      var isOn = data === null ? true : data.isOn !== false;
      var existing = document.querySelector('.system-off-overlay');
      if(existing) existing.remove();
      if(!isOn) {
        var overlay = document.createElement('div');
        overlay.className = 'system-off-overlay';
        overlay.innerHTML = '<div class="system-off-card"><div style="font-size:40px;">🔒</div><h3>সিস্টেম বন্ধ আছে</h3></div>';
        document.body.appendChild(overlay);
        var cells = document.querySelectorAll('#sheetBody td .cell-content');
        for(var i=0; i<cells.length; i++) cells[i].setAttribute('contenteditable', 'false');
      } else {
        var cells2 = document.querySelectorAll('#sheetBody td .cell-content');
        for(var j=0; j<cells2.length; j++) {
          var parentTd = cells2[j].parentElement;
          if(parentTd && parentTd.getAttribute('data-col') !== '0') cells2[j].setAttribute('contenteditable', 'true');
        }
      }
    });
  }

  function saveScrollPosition() {
    if(tableWrapper) localStorage.setItem(SCROLL_POSITION_KEY, JSON.stringify({ scrollTop: tableWrapper.scrollTop, scrollLeft: tableWrapper.scrollLeft }));
  }

  function restoreScrollPosition() {
    if(!tableWrapper) return;
    try {
      var saved = localStorage.getItem(SCROLL_POSITION_KEY);
      if(saved) {
        var pos = JSON.parse(saved);
        setTimeout(function() {
          if(tableWrapper) {
            tableWrapper.scrollTop = pos.scrollTop || 0;
            tableWrapper.scrollLeft = pos.scrollLeft || 0;
          }
        }, 50);
      }
    } catch(e){}
  }

  async function showAdminModal() {
    if(!currentLoggedInUser) return;

    var currentAdminInfo = null;
    var currentAdminUsername = currentTelegramUsername ? currentTelegramUsername.replace('@', '').toLowerCase() : null;

    if(firebaseDb && currentAdminUsername) {
        try {
            var snapshot = await firebaseDb.ref('adminUsers/' + currentAdminUsername).once('value');
            currentAdminInfo = snapshot.val();
        } catch(e) { console.warn(e); }
    }

    var savedAdminTg = localStorage.getItem("ADMIN_TG_USERNAME");
    var savedAdminChatId = localStorage.getItem("ADMIN_CHAT_ID");
    var savedAdminChannel = localStorage.getItem("ADMIN_CHANNEL_LINK");

    var tgUsernameValue = (currentAdminInfo && currentAdminInfo.username) ? currentAdminInfo.username : (savedAdminTg || "");
    var chatIdValue = (currentAdminInfo && currentAdminInfo.chatId) ? currentAdminInfo.chatId : (savedAdminChatId || "");
    var channelValue = (currentAdminInfo && currentAdminInfo.channelLink) ? currentAdminInfo.channelLink : (savedAdminChannel || "");

    var modalDiv = document.createElement('div');
    modalDiv.className = 'confirm-modal-overlay';
    modalDiv.innerHTML = `
      <div class="confirm-modal admin-modal">
        <div class="icon">👑</div>
        <h3>${currentAdminInfo ? '📝 এডমিন তথ্য আপডেট করুন' : '✨ এডমিন রেজিস্ট্রেশন'}</h3>
        <div class="info-box admin-info-box">
          <strong>⚠️ শুধুমাত্র এডমিনদের জন্য!</strong><br>
          👑 আপনি যদি এডমিন হন তবেই এখানে রেজিস্ট্রেশন করুন।<br>
          ${currentAdminInfo ? '✅ আপনি ইতিমধ্যে রেজিস্ট্রেশন করেছেন। নিচে আপনার তথ্য দেখুন এবং চাইলে আপডেট করতে পারেন।' : 'রেজিস্ট্রেশন করলে আপনার ইউজাররা আপনার ইউজারনেম ব্যবহার করে ফাইল সাবমিট করলে তা আপনার কাছে পৌঁছাবে।'}
        </div>
        <div class="input-area">
          <label>📛 টেলিগ্রাম ইউজারনেম <span class="required-star">*</span></label>
          <input type="text" id="adminTgUsername" placeholder="@username" autocomplete="off" value="${escapeHtml(tgUsernameValue)}">
          <div class="input-hint">আপনার টেলিগ্রাম ইউজারনেম দিন (যেটা আপনি @ দিয়ে শুরু করবেন)</div>
        </div>
        <div class="input-area">
          <label>🆔 টেলিগ্রাম চ্যাট আইডি <span class="required-star">*</span></label>
          <input type="text" id="adminChatId" placeholder="123456789" autocomplete="off" inputmode="numeric" value="${escapeHtml(chatIdValue)}">
          <div class="input-hint">🆔 শুধুমাত্র সংখ্যা দিন - অন্য লেখা থাকলে অটো ডিলিট হবে। 🤖 চ্যাট আইডি পেতে @idbot এ /start দিন</div>
        </div>
        <div class="input-area">
          <label>🔗 টেলিগ্রাম চ্যানেল লিংক</label>
          <input type="text" id="adminChannelLink" placeholder="https://t.me/yourchannel" autocomplete="off" value="${escapeHtml(channelValue)}">
          <div class="input-hint">(ঐচ্ছিক) আপনার চ্যানেলের লিংক দিন</div>
        </div>
        <div class="confirm-actions">
          <button class="confirm-yes" id="adminRegisterYesBtn">${currentAdminInfo ? '💾 তথ্য আপডেট করুন' : '✅ রেজিস্ট্রার করুন'}</button>
          <button class="confirm-no" id="adminRegisterNoBtn">❌ বাতিল করুন</button>
        </div>
      </div>
    `;
    document.body.appendChild(modalDiv);

    var yesBtn = document.getElementById('adminRegisterYesBtn');
    var noBtn = document.getElementById('adminRegisterNoBtn');
    var adminTgUsernameInput = document.getElementById('adminTgUsername');
    var adminChatIdInput = document.getElementById('adminChatId');
    var channelInput = document.getElementById('adminChannelLink');

    if(adminChatIdInput) {
      adminChatIdInput.addEventListener('input', function(e) {
        var rawValue = e.target.value;
        var numbersOnly = rawValue.replace(/[^0-9]/g, '');
        if (rawValue !== numbersOnly) {
          e.target.value = numbersOnly;
        }
      });
    }

    var cleanup = function() { if(modalDiv) modalDiv.remove(); };

    if(yesBtn) {
      yesBtn.addEventListener('click', async function() {
        var tgUsername = adminTgUsernameInput.value.trim();
        var chatId = adminChatIdInput.value.trim();
        var channelLink = channelInput.value.trim();

        chatId = chatId.replace(/[^0-9]/g, '');

        if(!tgUsername || !chatId) {
            showToast("❌ দয়া করে ইউজারনেম এবং চ্যাট আইডি দিন!");
            if(!tgUsername) adminTgUsernameInput.style.border = "2px solid #dc2626";
            if(!chatId) adminChatIdInput.style.border = "2px solid #dc2626";
            setTimeout(() => {
                adminTgUsernameInput.style.border = "";
                adminChatIdInput.style.border = "";
            }, 2000);
            return;
        }

        if(tgUsername && !tgUsername.startsWith('@')) tgUsername = '@' + tgUsername;
        var cleanUsername = tgUsername.replace('@', '').toLowerCase();

        localStorage.setItem("ADMIN_TG_USERNAME", tgUsername);
        localStorage.setItem("ADMIN_CHAT_ID", chatId);
        localStorage.setItem("ADMIN_CHANNEL_LINK", channelLink);

        if(!firebaseDb) {
            showToast("❌ Firebase সংযোগ নেই!");
            return;
        }

        showToast(currentAdminInfo ? "🔄 তথ্য আপডেট হচ্ছে..." : "📝 রেজিস্ট্রেশন হচ্ছে...");

        try {
            await firebaseDb.ref('adminUsers/' + cleanUsername).set({
                username: tgUsername,
                chatId: chatId,
                channelLink: channelLink || "",
                registeredAt: currentAdminInfo ? currentAdminInfo.registeredAt : Date.now(),
                lastUpdated: Date.now()
            });
            showToast(currentAdminInfo ? "✅ এডমিন তথ্য আপডেট সফল!" : "✅ এডমিন রেজিস্ট্রেশন সফল!");
            cleanup();
            setTimeout(() => {
                showToast("🎉 স্বাগতম এডমিন! এখন আপনি ফাইল রিসিভ করতে পারবেন।");
            }, 1500);

        } catch(err) {
            console.error(err);
            showToast("❌ অপারেশন ব্যর্থ! নেটওয়ার্ক চেক করুন।");
        }
      });
    }

    if(noBtn) {
      noBtn.addEventListener('click', function() { cleanup(); });
    }

    modalDiv.addEventListener('click', function(e) {
      if(e.target === modalDiv) cleanup();
    });
  }

  function bindButtons() {
    var copyBtn = document.getElementById('copyBtn');
    if(copyBtn) copyBtn.addEventListener('click', copySelected);
    var deleteBtn = document.getElementById('deleteBtn');
    if(deleteBtn) deleteBtn.addEventListener('click', deleteSelected);
    var clearBtn = document.getElementById('clearSelectionBtn');
    if(clearBtn) clearBtn.addEventListener('click', function() { clearAllSelection(); showToast("সিলেকশন ক্লিয়ার"); });
    var selectAllBtn = document.getElementById('selectAllColsBtn');
    if(selectAllBtn) selectAllBtn.addEventListener('click', selectAllDataColumns);
    var saveBtn = document.getElementById('saveUserBtn');
    if(saveBtn) saveBtn.addEventListener('click', saveUserInfo);

    var submitBtn = document.getElementById('submitMainBtn');
    if(submitBtn) {
      var newSubmitBtn = submitBtn.cloneNode(true);
      submitBtn.parentNode.replaceChild(newSubmitBtn, submitBtn);
      newSubmitBtn.addEventListener('click', function(e) {
        e.preventDefault();
        showSubmitModal();
      });
    }

    var adminBtn = document.getElementById('adminPanelBtn');
    if(adminBtn) {
      var newAdminBtn = adminBtn.cloneNode(true);
      adminBtn.parentNode.replaceChild(newAdminBtn, adminBtn);
      newAdminBtn.addEventListener('click', function(e) {
        e.preventDefault();
        showAdminModal();
      });
    }

    var logoutBtn = document.getElementById('logoutHeaderBtn');
    if(logoutBtn) logoutBtn.addEventListener('click', logout);
    if(uidToggle) uidToggle.addEventListener('click', toggleUidValidation);
    if(passwordAutoToggle) passwordAutoToggle.addEventListener('click', togglePasswordAuto);
    if(sheet1Btn) sheet1Btn.addEventListener('click', switchToSheet1);
    if(sheet2Btn) sheet2Btn.addEventListener('click', switchToSheet2);
    if(sheet3Btn) sheet3Btn.addEventListener('click', switchToSheet3);
    if(sheet4Btn) sheet4Btn.addEventListener('click', switchToSheet4);
  }

  function setupInputFocus() {
    var save = document.getElementById('saveUserBtn');
    if(tgUsernameInput && tgChatIdInput && save) {
      var show = function() { save.classList.add('show'); };
      var hide = function() { save.classList.remove('show'); };
      tgUsernameInput.addEventListener('focus', show);
      tgUsernameInput.addEventListener('blur', hide);
      tgChatIdInput.addEventListener('focus', show);
      tgChatIdInput.addEventListener('blur', hide);
    }
  }

  function logout() {
    if(currentLoggedInUser) {
      saveUserDataToFirebase(currentLoggedInUser);
    }
    auth.signOut();
    currentLoggedInUser = null;
    currentTelegramUsername = "";
    sheetData1 = [];
    sheetData2 = [];
    sheetData3 = [];
    sheetData4 = [];
    if(submittedUIDs1) submittedUIDs1.clear();
    if(submittedUIDs2) submittedUIDs2.clear();
    if(submittedUIDs3) submittedUIDs3.clear();
    if(submittedUIDs4) submittedUIDs4.clear();

    loginOverlay.classList.remove('hide');
    appContainer.classList.remove('visible');
    if(displayUsernameSpan) displayUsernameSpan.innerText = '-';
    showToast("লগআউট সফল!");
  }

  // ===== AUTH STATE LISTENER - FIXED LOADING =====
  let isFirstAuthCheck = true;

  auth.onAuthStateChanged(async function(user) {
    if (user) {
      console.log("✅ লগইন করেছেন:", user.email);
      currentLoggedInUser = user.uid;

      // লোডিং দেখান
      loadingScreen.classList.remove('hide');
      
      loginOverlay.classList.add('hide');
      appContainer.classList.add('visible');

      if (displayUsernameSpan) {
        displayUsernameSpan.innerText = user.email || user.uid;
      }

      sheetData1 = createEmptySheet();
      sheetData2 = createEmptySheet();
      sheetData3 = createEmptySheet();
      sheetData4 = createEmptySheet();
      submittedUIDs1 = new Set();
      submittedUIDs2 = new Set();
      submittedUIDs3 = new Set();
      submittedUIDs4 = new Set();

      // 🔥 শুধু Firebase থেকে লোড
      await loadUserDataFromFirebase(user.uid);

      sheetBody = document.getElementById('sheetBody');
      tableWrapper = document.getElementById('tableWrapper');
      if (tableWrapper) tableWrapper.addEventListener('scroll', saveScrollPosition);

      loadUidValidationState();
      loadPasswordAutoState();
      bindButtons();
      setupInputFocus();
      checkSystemStatus();

      if (tgChatIdInput) {
        tgChatIdInput.addEventListener('input', function(e) {
          this.value = this.value.replace(/[^0-9]/g, '');
        });
      }

      var lastSheet = loadLastSheet();
      currentSheet = lastSheet || 1;

      if (currentSheet === 1) { sheet1Btn.classList.add('active'); sheet2Btn.classList.remove('active'); sheet3Btn.classList.remove('active'); sheet4Btn.classList.remove('active'); }
      else if (currentSheet === 2) { sheet2Btn.classList.add('active'); sheet1Btn.classList.remove('active'); sheet3Btn.classList.remove('active'); sheet4Btn.classList.remove('active'); }
      else if (currentSheet === 3) { sheet3Btn.classList.add('active'); sheet1Btn.classList.remove('active'); sheet2Btn.classList.remove('active'); sheet4Btn.classList.remove('active'); }
      else if (currentSheet === 4) { sheet4Btn.classList.add('active'); sheet1Btn.classList.remove('active'); sheet2Btn.classList.remove('active'); sheet3Btn.classList.remove('active'); }

      fullRender();
      saveUserDataToFirebase(user.uid);

      // লোডিং শেষ
      setTimeout(function() {
        loadingScreen.classList.add('hide');
      }, 150);

    } else {
      console.log("❌ লগইন করেনি");
      loadingScreen.classList.add('hide');
      loginOverlay.classList.remove('hide');
      appContainer.classList.remove('visible');
      currentLoggedInUser = null;
    }
    isFirstAuthCheck = false;
  });

})();
</script>
</body>
