<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EBH TEAM | ইউজার রেজিস্ট্রেশন</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans Bengali', sans-serif;
            background: linear-gradient(145deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* ব্যাকগ্রাউন্ড এফেক্ট */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="15" cy="15" r="2" fill="rgba(255,255,255,0.08)"/><circle cx="85" cy="25" r="3" fill="rgba(255,255,255,0.06)"/><circle cx="45" cy="80" r="2.5" fill="rgba(255,255,255,0.08)"/></svg>');
            background-size: 50px;
            pointer-events: none;
        }

        .reg-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* হেডার কার্ড - গ্লাসমরফিজম */
        .header-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 28px 25px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .logo {
            font-size: 46px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #ffd89b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 3px;
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            margin-top: 10px;
            font-weight: 600;
        }

        /* রেজিস্ট্রেশন কার্ড */
        .reg-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 50px;
            padding: 35px 28px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .reg-title {
            background: linear-gradient(135deg, #203a43, #2c5364);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .reg-title i {
            font-size: 30px;
            background: linear-gradient(135deg, #203a43, #2c5364);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-label {
            display: block;
            color: #2d3748;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .input-label i {
            color: #2c5364;
            margin-right: 10px;
            font-size: 14px;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 40px;
            font-size: 15px;
            color: #2d3748;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #2c5364;
            box-shadow: 0 0 0 4px rgba(44, 83, 100, 0.15);
        }

        .input-field::placeholder {
            color: #a0aec0;
        }

        .helper-text {
            font-size: 11px;
            color: #718096;
            margin-top: 8px;
            margin-left: 18px;
        }

        .helper-text a {
            color: #2c5364;
            text-decoration: none;
            font-weight: 700;
        }

        /* চ্যাট আইডি বের করার বাটন */
        .chatid-help {
            background: rgba(44, 83, 100, 0.08);
            border-radius: 35px;
            padding: 12px 18px;
            margin-top: 15px;
            margin-bottom: 10px;
            text-align: center;
            border: 1px dashed #2c5364;
        }

        .chatid-help p {
            font-size: 12px;
            color: #4a5568;
            margin-bottom: 10px;
        }

        .get-id-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #203a43, #2c5364);
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(44,83,100,0.3);
        }

        .get-id-btn:active {
            transform: scale(0.96);
        }

        /* রেজিস্ট্রেশন বাটন */
        .register-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #203a43, #2c5364);
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 800;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(44,83,100,0.4);
        }

        .register-btn:active {
            transform: scale(0.97);
            box-shadow: 0 4px 12px rgba(44,83,100,0.3);
        }

        .register-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        /* স্ট্যাটাস বার (সার্ভার স্ট্যাটাস) */
        .status-bar {
            background: rgba(44, 83, 100, 0.1);
            border-radius: 50px;
            padding: 12px 20px;
            margin-top: 25px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #2c5364;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(44,83,100,0.2);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #48bb78;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .status-dot.offline {
            background: #f56565;
            animation: none;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* টোস্ট মেসেজ */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 14px 20px;
            border-radius: 50px;
            text-align: center;
            transform: translateY(150%);
            transition: 0.3s;
            z-index: 1000;
            border-left: 5px solid;
            max-width: 450px;
            margin: 0 auto;
            font-size: 14px;
            font-weight: 500;
        }

        .toast.show {
            transform: translateY(0);
        }

        .toast.success { border-left-color: #48bb78; background: #1e293b; }
        .toast.error { border-left-color: #f56565; background: #1e293b; }
        .toast.warning { border-left-color: #f59e0b; background: #1e293b; }

        footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 11px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="reg-container">
        <div class="header-card">
            <div class="logo">EBH TEAM</div>
            <div class="subtitle">✦ ইউজার রেজিস্ট্রেশন প্যানেল ✦</div>
        </div>

        <div class="reg-card">
            <div class="reg-title">
                <i class="fas fa-user-plus"></i>
                <span>নতুন ইউজার রেজিস্টার</span>
            </div>

            <div class="input-group">
                <label class="input-label"><i class="fab fa-telegram"></i> টেলিগ্রাম ইউজারনেম</label>
                <input type="text" id="regUsername" class="input-field" placeholder="@username" autocomplete="off">
                <div class="helper-text">যেমন: @ebh_team</div>
            </div>

            <div class="input-group">
                <label class="input-label"><i class="fas fa-id-card"></i> চ্যাট আইডি</label>
                <input type="number" id="regChatId" class="input-field" placeholder="123456789" autocomplete="off">
                <div class="helper-text">ইউজারের চ্যাট আইডি নম্বর দিন</div>
            </div>

            <!-- চ্যাট আইডি বের করার হেল্পার -->
            <div class="chatid-help">
                <p><i class="fas fa-question-circle"></i> আপনার চ্যাট আইডি জানেন না?</p>
                <a href="https://t.me/id_bot?start=start" target="_blank" class="get-id-btn">
                    <i class="fab fa-telegram"></i>  -এ ক্লিক করুন আপনার চ্যাট আইডি পাবেন 
                </a>
                <p style="font-size: 10px; margin-top: 8px;">বটে /start দিন, আপনার চ্যাট আইডি দেখাবে</p>
            </div>

            <button class="register-btn" id="registerBtn" onclick="registerUser()">
                <i class="fas fa-check-circle"></i> রেজিস্ট্রেশন করুন
            </button>

            <div class="status-bar" id="statusBar">
                <div class="status-dot" id="statusDot"></div>
                <span id="connectionStatus">সার্ভারের সাথে সংযোগ হচ্ছে...</span>
            </div>
        </div>

        <footer>
            <i class="fas fa-shield-alt"></i> শুধুমাত্র অ্যাডমিনদের জন্য | EBH TEAM
        </footer>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ========== FIREBASE CONFIG ==========
        const firebaseConfig = {
            apiKey: "AIzaSyCHqx6dAHeGFdtvY8682b_iQkdnk2ie0ug",
            authDomain: "saprahik-kaj.firebaseapp.com",
            databaseURL: "https://saprahik-kaj-default-rtdb.firebaseio.com",
            projectId: "saprahik-kaj",
            storageBucket: "saprahik-kaj.firebasestorage.app",
            messagingSenderId: "336661054558",
            appId: "1:336661054558:web:1beb394b660c9d6cf520cf"
        };

        let firebaseDb = null;
        let isConnected = false;

        // ========== সার্ভার কানেকশন ফাংশন (পেজ লোড হওয়ার সাথে সাথে) ==========
        async function connectToServer() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('connectionStatus');
            
            statusText.innerHTML = 'সার্ভারের সাথে সংযোগ হচ্ছে...';
            statusDot.className = 'status-dot';
            
            try {
                // Firebase ইতিমধ্যে initialized কিনা চেক
                if (firebase.apps.length === 0) {
                    firebase.initializeApp(firebaseConfig);
                }
                firebaseDb = firebase.database();
                
                // সার্ভার কানেকশন টেস্ট (একটি ছোট রেফারেন্স চেক)
                const testRef = firebaseDb.ref('.info/connected');
                testRef.on('value', (snapshot) => {
                    if (snapshot.val() === true) {
                        isConnected = true;
                        statusDot.className = 'status-dot';
                        statusDot.style.background = '#48bb78';
                        statusText.innerHTML = '✅ সার্ভারের সাথে সংযুক্ত';
                        console.log("✅ Server connected");
                        
                        // সংযোগ成功后 লিস্ট লোড
                        loadUserList();
                    } else {
                        isConnected = false;
                        statusDot.className = 'status-dot offline';
                        statusDot.style.background = '#f56565';
                        statusText.innerHTML = '⚠️ সার্ভারের সাথে সংযোগ নেই';
                    }
                });
                
            } catch(e) {
                console.error("Server connection error:", e);
                statusDot.className = 'status-dot offline';
                statusDot.style.background = '#f56565';
                statusText.innerHTML = '❌ সার্ভার সংযোগ ব্যর্থ';
                showToast("❌ সার্ভার সংযোগ ব্যর্থ, ইন্টারনেট চেক করুন", "error");
            }
        }

        // পেজ লোড হওয়ার সাথে সাথে কানেকশন শুরু
        connectToServer();

        // ========== ইউজার রেজিস্ট্রেশন ফাংশন ==========
        window.registerUser = async function() {
            if (!firebaseDb || !isConnected) {
                showToast("❌ সার্ভারের সাথে সংযোগ নেই", "error");
                return;
            }

            let username = document.getElementById('regUsername').value.trim();
            let chatId = document.getElementById('regChatId').value.trim();

            if (!username) {
                showToast("❌ টেলিগ্রাম ইউজারনেম দিন", "warning");
                return;
            }
            if (!chatId) {
                showToast("❌ চ্যাট আইডি দিন", "warning");
                return;
            }
            if (!chatId.match(/^\d+$/)) {
                showToast("❌ চ্যাট আইডি শুধু সংখ্যা হতে হবে", "warning");
                return;
            }

            // ইউজারনেম ফরম্যাট ঠিক করা
            if (!username.startsWith('@')) {
                username = '@' + username;
            }
            const cleanUsername = username.replace('@', '').toLowerCase();

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> রেজিস্ট্রেশন হচ্ছে...';

            try {
                // চেক করা আগে থেকে আছে কিনা (ডুপ্লিকেট চেক)
                const checkSnapshot = await firebaseDb.ref(`telegramUsers/${cleanUsername}`).once('value');
                const chatIdSnapshot = await firebaseDb.ref('telegramUsers').orderByChild('chatId').equalTo(parseInt(chatId)).once('value');
                
                let duplicateChatIdUser = null;
                chatIdSnapshot.forEach((snap) => {
                    duplicateChatIdUser = snap.val().username;
                });
                
                if (duplicateChatIdUser && duplicateChatIdUser !== username) {
                    showToast(`⚠️ এই চ্যাট আইডি ইতিমধ্যে "${duplicateChatIdUser}" ইউজারের জন্য রেজিস্টার্ড আছে!`, "warning");
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check-circle"></i> রেজিস্ট্রেশন করুন';
                    return;
                }
                
                if (checkSnapshot.exists()) {
                    // আপডেট করুন
                    await firebaseDb.ref(`telegramUsers/${cleanUsername}`).update({
                        chatId: parseInt(chatId),
                        username: username,
                        updatedAt: Date.now()
                    });
                    showToast(`✅ ${username} আপডেট করা হয়েছে (সার্ভারে সেভ হয়েছে)`, "success");
                } else {
                    // নতুন রেজিস্ট্রেশন
                    await firebaseDb.ref(`telegramUsers/${cleanUsername}`).set({
                        chatId: parseInt(chatId),
                        username: username,
                        fullName: "Manual Entry",
                        registeredAt: Date.now(),
                        lastActive: Date.now()
                    });
                    showToast(`✅ ${username} সফলভাবে রেজিস্টার হয়েছে! (সার্ভারে সংরক্ষিত)`, "success");
                }

                // ফিল্ড ক্লিয়ার
                document.getElementById('regUsername').value = '';
                document.getElementById('regChatId').value = '';
                
                // লিস্ট রিফ্রেশ (শুধুমাত্র অ্যাডমিনের জন্য, ইউজার দেখবে না)
                // আমরা শুধু কনসোল এ লগ রাখছি, UI তে কিছু দেখাবো না
                console.log("User registered successfully");

            } catch(e) {
                console.error("Register error:", e);
                showToast("❌ রেজিস্ট্রেশন ব্যর্থ: " + e.message, "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check-circle"></i> রেজিস্ট্রেশন করুন';
            }
        };

        // ========== ইউজার লিস্ট লোড (শুধু কনসোলের জন্য, UI তে দেখাবে না) ==========
        async function loadUserList() {
            if (!firebaseDb || !isConnected) return;
            
            try {
                const snapshot = await firebaseDb.ref('telegramUsers').once('value');
                if (snapshot.exists()) {
                    const users = snapshot.val();
                    const count = Object.keys(users).length;
                    // শুধু স্ট্যাটাস বারে মোট কাউন্ট দেখাবেন না (সার্ভার স্ট্যাটাস শুধু দেখাবেন)
                    console.log(`📊 Total registered users: ${count}`);
                }
            } catch(e) {
                console.error("Load error:", e);
            }
        }

        // ========== হেল্পার ফাংশন ==========
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type} show`;
            toast.innerHTML = message;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // এন্টার কী প্রেস করলে রেজিস্ট্রেশন
        document.getElementById('regChatId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                registerUser();
            }
        });
        document.getElementById('regUsername').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('regChatId').focus();
            }
        });
    </script>
</body>
</html>
