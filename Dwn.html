<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EBH এক্সেল ডাউনলোডার</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0b2b44 0%, #1e5a88 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 48px;
      max-width: 480px;
      width: 100%;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .icon {
      font-size: 60px;
      margin-bottom: 15px;
    }
    h1 {
      font-size: 24px;
      color: #0b2b44;
      margin-bottom: 8px;
    }
    .sub {
      color: #5b6e8c;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .count-box {
      background: #eef2ff;
      border-radius: 60px;
      padding: 12px 20px;
      margin: 20px 0;
      display: inline-block;
    }
    .count-number {
      font-size: 38px;
      font-weight: 800;
      color: #1e5a88;
    }
    .count-label {
      font-size: 13px;
      color: #5b6e8c;
    }
    .info-box {
      background: #fffbeb;
      border-radius: 20px;
      padding: 10px;
      margin: 15px 0;
      font-size: 12px;
      color: #d97706;
    }
    .status {
      font-size: 14px;
      color: #10b981;
      margin: 15px 0;
      font-weight: 500;
      background: #f0fdf4;
      padding: 10px;
      border-radius: 30px;
    }
    .btn {
      background: linear-gradient(95deg, #0b2b44, #1e5a88);
      border: none;
      padding: 14px 28px;
      border-radius: 60px;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.2s;
      width: 100%;
    }
    .btn:active {
      transform: scale(0.97);
    }
    .footer {
      margin-top: 25px;
      font-size: 11px;
      color: #94a3b8;
    }
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #e2e8f0;
      border-top: 2px solid #1e5a88;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="card">
  <div class="icon">📊</div>
  <h1>EBH এক্সেল ডাউনলোডার</h1>
  <div class="sub">সবচেয়ে বেশি আইডি যার, সবার উপরে</div>
  
  <div class="count-box">
    <div class="count-number" id="totalCount">0</div>
    <div class="count-label">মোট ইউনিক আইডি</div>
  </div>
  
  <div class="info-box" id="infoBox">🔍 ডুপ্লিকেট UID অটো রিমুভ | সবচেয়ে বেশি আইডি যার সবার উপরে</div>
  
  <div class="status" id="statusText">
    <span class="loading"></span> ডাটা সংগ্রহ করা হচ্ছে...
  </div>
  
  <button class="btn" id="downloadBtn">📥 এক্সেল ডাউনলোড</button>
  
  <div class="footer">
    ⚡ একই UID থাকলে শুধু প্রথমটি রাখা হবে<br>
    📅 তারিখ: <span id="dateSpan"></span>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCHqx6dAHeGFdtvY8682b_iQkdnk2ie0ug",
    authDomain: "saprahik-kaj.firebaseapp.com",
    databaseURL: "https://saprahik-kaj-default-rtdb.firebaseio.com",
    projectId: "saprahik-kaj",
    storageBucket: "saprahik-kaj.firebasestorage.app",
    messagingSenderId: "336661054558",
    appId: "1:336661054558:web:1beb394b660c9d6cf520cf"
  };
  
  let db = null;
  let isDownloading = false;

  const today = new Date();
  document.getElementById('dateSpan').innerText = today.toLocaleDateString('bn-BD');

  function showStatus(msg, isError = false, isLoading = false) {
    const statusEl = document.getElementById('statusText');
    if (isLoading) {
      statusEl.innerHTML = `<span class="loading"></span> ${msg}`;
    } else {
      statusEl.innerHTML = msg;
    }
    statusEl.style.background = isError ? '#fee2e2' : '#f0fdf4';
    statusEl.style.color = isError ? '#dc2626' : '#10b981';
  }

  function updateUI(totalUnique, totalUsers, duplicateCount, topUserName, topUserCount) {
    document.getElementById('totalCount').innerText = totalUnique.toLocaleString();
    const infoBox = document.getElementById('infoBox');
    if (duplicateCount > 0) {
      infoBox.innerHTML = `⚠️ ${duplicateCount} টি ডুপ্লিকেট রিমুভ | 🏆 শীর্ষ: ${topUserName} (${topUserCount} টি) | ${totalUsers} জন ইউজার`;
      infoBox.style.background = '#fef3c7';
      infoBox.style.color = '#d97706';
    } else {
      infoBox.innerHTML = `✅ 🏆 শীর্ষ: ${topUserName} (${topUserCount} টি) | ${totalUsers} জন ইউজার | কোনো ডুপ্লিকেট নেই`;
      infoBox.style.background = '#f0fdf4';
      infoBox.style.color = '#15803d';
    }
  }

  // ইউজারভিত্তিক ডাটা সংগ্রহ
  async function fetchUsersDataSeparately() {
    if (!db) return [];
    
    try {
      const usersSnap = await db.ref('users').once('value');
      const usersObj = usersSnap.val();
      if (!usersObj) return [];
      
      const usernames = Object.keys(usersObj);
      const usersData = [];
      
      for (const username of usernames) {
        try {
          const sheetSnap = await db.ref(`userSheets/${username}/sheetData`).once('value');
          const sheetData = sheetSnap.val();
          const userRows = [];
          
          if (sheetData && Array.isArray(sheetData)) {
            for (const row of sheetData) {
              if (row && row[1] && row[1].toString().trim() !== "") {
                userRows.push([
                  row[1] || "",      // UID
                  row[2] || "",      // পাসওয়ার্ড
                  row[3] || "",      // কুকিজ/2FA
                  row[4] || "",      // D
                  row[5] || ""       // E
                ]);
              }
            }
          }
          
          if (userRows.length > 0) {
            usersData.push({
              username: username,
              rows: userRows,
              rawCount: userRows.length
            });
          }
        } catch(e) {
          console.warn(`${username} এর ডাটা লোডে সমস্যা:`, e);
        }
      }
      
      return usersData;
    } catch(err) {
      console.error(err);
      throw err;
    }
  }

  // ইউজারভিত্তিক ডুপ্লিকেট রিমুভ ও কাউন্ট আপডেট
  function processUsersData(usersData) {
    const processedUsers = [];
    let totalUniqueRows = 0;
    let totalDuplicateCount = 0;
    
    for (const user of usersData) {
      const uniqueMap = new Map();
      let userDuplicateCount = 0;
      
      for (const row of user.rows) {
        const uid = row[0];
        if (!uid || uid.toString().trim() === "") continue;
        const uidKey = uid.toString().trim();
        
        if (!uniqueMap.has(uidKey)) {
          uniqueMap.set(uidKey, [...row]);
        } else {
          userDuplicateCount++;
        }
      }
      
      const uniqueRows = Array.from(uniqueMap.values());
      totalUniqueRows += uniqueRows.length;
      totalDuplicateCount += userDuplicateCount;
      
      processedUsers.push({
        username: user.username,
        rows: uniqueRows,
        count: uniqueRows.length,
        duplicateCount: userDuplicateCount
      });
    }
    
    // **সবচেয়ে বেশি আইডি যার সবার উপরে - বড় থেকে ছোট সাজানো**
    processedUsers.sort((a, b) => b.count - a.count);
    
    return { processedUsers, totalUniqueRows, totalDuplicateCount };
  }

  // এক্সেল ডাটা তৈরি (প্রতি ইউজারের পর ফাঁকা সারি)
  function buildExcelData(processedUsers) {
    const excelRows = [];
    
    for (let i = 0; i < processedUsers.length; i++) {
      const user = processedUsers[i];
      
      // এই ইউজারের সব ডাটা যোগ করা
      for (const row of user.rows) {
        excelRows.push([...row]);
      }
      
      // শেষ ইউজার না হলে একটি ফাঁকা সারি যোগ করা
      if (i < processedUsers.length - 1) {
        excelRows.push(["", "", "", "", ""]);
      }
    }
    
    return excelRows;
  }

  // ডাউনলোড প্রসেস
  async function generateAndDownload() {
    if (isDownloading) {
      showStatus("⏳ আগের ডাউনলোড চলছে, একটু পরে চেষ্টা করুন", false, false);
      return;
    }
    
    isDownloading = true;
    showStatus("📡 ফায়ারবেস থেকে ডাটা সংগ্রহ করা হচ্ছে...", false, true);
    
    try {
      if (!db) {
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }
        db = firebase.database();
        await new Promise(r => setTimeout(r, 300));
      }
      
      showStatus("📊 সকল ইউজারের ডাটা আনছে...", false, true);
      
      const usersData = await fetchUsersDataSeparately();
      
      if (usersData.length === 0) {
        showStatus("⚠️ কোনো ডাটা পাওয়া যায়নি!", true, false);
        isDownloading = false;
        return;
      }
      
      showStatus(`🔄 ডুপ্লিকেট চেক ও সাজানো হচ্ছে (${usersData.length} জন ইউজার)...`, false, true);
      
      const { processedUsers, totalUniqueRows, totalDuplicateCount } = processUsersData(usersData);
      
      // শীর্ষ ইউজার খুঁজে বের করা (ইতিমধ্যেই সাজানো, প্রথমটি সবচেয়ে বেশি)
      const topUser = processedUsers[0];
      const topUserName = topUser.username;
      const topUserCount = topUser.count;
      
      showStatus(`📝 ${totalUniqueRows} টি ইউনিক আইডি পাওয়া গেছে, এক্সেল তৈরি হচ্ছে...`, false, false);
      
      const excelRows = buildExcelData(processedUsers);
      
      updateUI(totalUniqueRows, processedUsers.length, totalDuplicateCount, topUserName, topUserCount);
      
      const ws = XLSX.utils.aoa_to_sheet(excelRows);
      
      ws['!cols'] = [
        { wch: 18 },  // UID
        { wch: 22 },  // পাসওয়ার্ড
        { wch: 35 },  // কুকিজ/2FA
        { wch: 12 },  // D
        { wch: 12 }   // E
      ];
      
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "EBH_All_Accounts");
      
      const dateStr = today.toISOString().slice(0, 19).replace(/:/g, '-');
      const fileName = `EBH_Accounts_${dateStr}.xlsx`;
      
      XLSX.writeFile(wb, fileName);
      
      let successMsg = `✅ সম্পূর্ণ! ${totalUniqueRows} টি ইউনিক আইডি ডাউনলোড হয়েছে`;
      if (totalDuplicateCount > 0) {
        successMsg += ` (${totalDuplicateCount} টি ডুপ্লিকেট বাদ দেওয়া হয়েছে)`;
      }
      successMsg += ` | 🏆 শীর্ষ: ${topUserName} (${topUserCount} টি)`;
      showStatus(successMsg, false, false);
      
    } catch(err) {
      console.error(err);
      showStatus("❌ ডাউনলোড ব্যর্থ! নেটওয়ার্ক চেক করুন", true, false);
    } finally {
      isDownloading = false;
    }
  }

  document.getElementById('downloadBtn').addEventListener('click', generateAndDownload);

  async function autoDownload() {
    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      db = firebase.database();
      showStatus("🚀 সংযোগ স্থাপন, ডাউনলোড শুরু হচ্ছে...", false, true);
      await new Promise(r => setTimeout(r, 400));
      await generateAndDownload();
    } catch(e) {
      console.error(e);
      showStatus("❌ অটো ডাউনলোড ব্যর্থ, ম্যানুয়ালি চেষ্টা করুন", true, false);
    }
  }
  
  setTimeout(autoDownload, 400);
</script>
</body>
</html>
