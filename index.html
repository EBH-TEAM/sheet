  function showToast(msg) { 
    const toast = document.getElementById('liveToast'); 
    if(!toast) return;
    toast.innerText = msg; 
    toast.style.opacity = '1'; 
    setTimeout(() => toast.style.opacity = '0', 1800);

  function escapeHtml(str) { 
    if(!str) return '';
    return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m); 
  }

  // UID ভ্যালিডেশন টগল ফাংশন
  function loadUidValidationState() {
    const saved = localStorage.getItem(UID_VALIDATION_STATE_KEY);
    if(saved !== null) {
      isUidValidationEnabled = saved === 'true';
    } else {
      isUidValidationEnabled = true;
    }
    if(uidToggle) {
      if(isUidValidationEnabled) uidToggle.classList.add('active');
      else uidToggle.classList.remove('active');
    }
  }
  
  function saveUidValidationState() {
    localStorage.setItem(UID_VALIDATION_STATE_KEY, isUidValidationEnabled);
  }

  function toggleUidValidation() {
    isUidValidationEnabled = !isUidValidationEnabled;
    if(uidToggle) {
      if(isUidValidationEnabled) uidToggle.classList.add('active');
      else uidToggle.classList.remove('active');
    }
    saveUidValidationState();
    showToast(isUidValidationEnabled ? "✅ UID ভ্যালিডেশন চালু (শুধু সংখ্যা)" : "⚪ UID ভ্যালিডেশন বন্ধ (যেকোনো লেখা)");
  }

  function validateAndCleanUidCell(cellDiv, row) {
    if(!isUidValidationEnabled) return;
    let raw = cellDiv.innerText;
    let onlyNumbers = raw.replace(/[^0-9]/g, '');
    if(onlyNumbers !== raw) {
      cellDiv.innerText = onlyNumbers;
    }
    // শীট ডাটা আপডেট করা
    if(sheetData[row] && sheetData[row][1] !== onlyNumbers) {
      if (!isUndoRedo) pushToUndo();
      sheetData[row][1] = onlyNumbers;
      saveToLocalStorageForUser(currentLoggedInUser);
      saveUserDataToFirebase(currentLoggedInUser);
      updateBFromARow(row, onlyNumbers);
      checkDuplicateHighlight();
    }
  }

  function saveAuthToken(username, password) {
    localStorage.setItem(AUTH_TOKEN_KEY, JSON.stringify({ username, password, timestamp: Date.now() }));
  }
  function getAuthToken() {
    try {
      const data = localStorage.getItem(AUTH_TOKEN_KEY);
      if(data) return JSON.parse(data);
    } catch(e) {}
    return null;
  }
  function clearAuthToken() {
    localStorage.removeItem(AUTH_TOKEN_KEY);
  }

  async function loadUserDataFromFirebase(username) {
    if(!firebaseDb) return false;
    try {
      const snapshot = await firebaseDb.ref(`userSheets/${username}`).once('value');
      const data = snapshot.val();
      if(data && data.sheetData) {
        sheetData = data.sheetData;
        if(data.submittedUIDs) submittedUIDs = new Set(data.submittedUIDs);
        if(data.chatId) currentChatId = data.chatId;
        if(data.telegramUsername) currentTelegramUsername = data.telegramUsername;
        if(tgUsernameInput) tgUsernameInput.value = currentTelegramUsername;
        if(currentChatId && tgChatIdInput) tgChatIdInput.value = currentChatId;
        saveToLocalStorageForUser(username);
        return true;
      }
    } catch(e) { console.warn(e); }
    return false;
  }

  function saveUserDataToFirebase(username) {
    if(!firebaseDb || !username) return;
    const tgUsernameRaw = tgUsernameInput?.value.trim() || "";
    const chatIdRaw = tgChatIdInput?.value.trim() || "";
    if (tgUsernameRaw && !tgUsernameRaw.startsWith('@')) currentTelegramUsername = '@' + tgUsernameRaw;
    else currentTelegramUsername = tgUsernameRaw;
    currentChatId = chatIdRaw;
    
    const dataToSave = {
      sheetData: sheetData,
      submittedUIDs: [...submittedUIDs],
      chatId: currentChatId,
      telegramUsername: currentTelegramUsername,
      lastUpdated: Date.now()
    };
    firebaseDb.ref(`userSheets/${username}`).set(dataToSave).catch(e=>console.warn(e));
    if(currentTelegramUsername && currentTelegramUsername !== "") {
      const cleanUser = currentTelegramUsername.replace('@', '').toLowerCase();
      firebaseDb.ref(`telegramUsers/${cleanUser}`).set({
        chatId: parseInt(currentChatId) || 0,
        username: currentTelegramUsername,
        linkedAccount: username
      }).catch(e=>console.warn(e));
    }
  }

  function saveToLocalStorageForUser(username) {
    localStorage.setItem(STORAGE_KEY_PREFIX + username, JSON.stringify(sheetData));
    localStorage.setItem(SUBMITTED_UID_KEY_PREFIX + username, JSON.stringify([...submittedUIDs]));
  }

  function loadFromLocalStorageForUser(username) {
    const savedSheet = localStorage.getItem(STORAGE_KEY_PREFIX + username);
    if(savedSheet) {
      try { sheetData = JSON.parse(savedSheet); } catch(e) {}
    }
    const savedSubmitted = localStorage.getItem(SUBMITTED_UID_KEY_PREFIX + username);
    if(savedSubmitted) {
      try { submittedUIDs = new Set(JSON.parse(savedSubmitted)); } catch(e) {}
    }
  }

  async function initUserSession(username, password, isNew = false) {
    currentLoggedInUser = username;
    currentLoginUsername = username;
    const loaded = await loadUserDataFromFirebase(username);
    if(!loaded) {
      loadFromLocalStorageForUser(username);
      if(!sheetData || sheetData.length !== ROWS) {
        sheetData = Array(ROWS).fill().map(() => Array(COLS).fill(''));
        for (let i = 0; i < ROWS; i++) sheetData[i][0] = (i+1).toString();
      }
      if(!submittedUIDs) submittedUIDs = new Set();
    }
    if(tgUsernameInput && tgUsernameInput.value) currentTelegramUsername = tgUsernameInput.value;
    if(tgChatIdInput && tgChatIdInput.value) currentChatId = tgChatIdInput.value;
    
    displayUsernameSpan.innerText = username;
    fullRender();
    saveUserDataToFirebase(username);
    
    loadingScreen.classList.add('hide');
    loginOverlay.classList.remove('visible');
    appContainer.classList.add('visible');
    saveAuthToken(username, password);
  }

  function logout() {
    if(currentLoggedInUser) {
      saveUserDataToFirebase(currentLoggedInUser);
    }
    clearAuthToken();
    currentLoggedInUser = null;
    currentLoginUsername = "";
    currentTelegramUsername = "";
    sheetData = [];
    submittedUIDs.clear();
    
    loadingScreen.classList.add('hide');
    loginOverlay.classList.add('visible');
    appContainer.classList.remove('visible');
    loginUsername.value = '';
    loginPassword.value = '';
    loginError.style.display = 'none';
  }

  async function handleLoginOrRegister() {
    const username = loginUsername.value.trim();
    const password = loginPassword.value.trim();
    if(!username || !password) {
      loginError.innerText = "ইউজারনেম ও পাসওয়ার্ড দিন";
      loginError.style.display = 'block';
      return;
    }
    loginError.style.display = 'none';
    if(!firebaseDb) {
      loginError.innerText = "Firebase সংযোগ নেই!";
      loginError.style.display = 'block';
      return;
    }
    
    loadingScreen.classList.remove('hide');
    
    try {
      const userRef = firebaseDb.ref(`users/${username}`);
      const snapshot = await userRef.once('value');
      const userData = snapshot.val();
      
      if(userData) {
        if(userData.password === password) {
          await initUserSession(username, password, false);
        } else {
          loadingScreen.classList.add('hide');
          loginError.innerText = "ভুল পাসওয়ার্ড!";
          loginError.style.display = 'block';
        }
      } else {
        await userRef.set({ password: password, createdAt: Date.now() });
        await initUserSession(username, password, true);
        showToast("✅ রেজিস্ট্রেশন সফল! স্বাগতম!");
      }
    } catch(err) {
      console.error(err);
      loadingScreen.classList.add('hide');
      loginError.innerText = "সার্ভার ত্রুটি, আবার চেষ্টা করুন";
      loginError.style.display = 'block';
    }
  }

  async function checkAutoLogin() {
    const token = getAuthToken();
    if(token && token.username && token.password && firebaseDb) {
      try {
        const ref = firebaseDb.ref(`users/${token.username}`);
        const snap = await ref.once('value');
        if(snap.exists() && snap.val().password === token.password) {
          await initUserSession(token.username, token.password, false);
          return true;
        } else {
          clearAuthToken();
        }
      } catch(e) { console.warn(e); }
    }
    return false;
  }

  // ==================== স্প্রেডশীট ফাংশন (অপরিবর্তিত) ====================
  function getMasterPassword() { return (sheetData[0] && sheetData[0][2]) ? sheetData[0][2] : ''; }
  
  function updateBFromARow(row, newAValue) {
    sheetData[row][1] = newAValue;
    if (newAValue && newAValue.toString().trim() !== "") {
      const masterPass = getMasterPassword();
      if (masterPass && masterPass.trim() !== "") {
        sheetData[row][2] = masterPass;
        const bContent = document.querySelector(`#sheetBody td[data-row='${row}'][data-col='2'] .cell-content`);
        if (bContent && bContent.innerText !== masterPass) bContent.innerText = masterPass;
      }
    } else {
      sheetData[row][2] = "";
      const bContent = document.querySelector(`#sheetBody td[data-row='${row}'][data-col='2'] .cell-content`);
      if (bContent) bContent.innerText = "";
    }
    saveToLocalStorageForUser(currentLoggedInUser);
    saveUserDataToFirebase(currentLoggedInUser);
    checkDuplicateHighlight();
  }
  
  function pushToUndo() { if (!isUndoRedo) { const copy = JSON.parse(JSON.stringify(sheetData)); undoStack.push(copy); if (undoStack.length > MAX_HISTORY) undoStack.shift(); redoStack = []; } }
  function undo() { if (undoStack.length === 0) { showToast("❌ আর Undo নেই"); return; } isUndoRedo = true; redoStack.push(JSON.parse(JSON.stringify(sheetData))); sheetData = undoStack.pop(); fullRender(); saveToLocalStorageForUser(currentLoggedInUser); saveUserDataToFirebase(currentLoggedInUser); isUndoRedo = false; showToast("↩️ Undone"); }
  function redo() { if (redoStack.length === 0) { showToast("❌ আর Redo নেই"); return; } isUndoRedo = true; undoStack.push(JSON.parse(JSON.stringify(sheetData))); sheetData = redoStack.pop(); fullRender(); saveToLocalStorageForUser(currentLoggedInUser); saveUserDataToFirebase(currentLoggedInUser); isUndoRedo = false; showToast("🔁 Redone"); }
  
  function checkDuplicateHighlight() {
    const cellsA = document.querySelectorAll('#sheetBody td[data-col="1"] .cell-content');
    cellsA.forEach(cell => { if (cell.parentElement) cell.parentElement.classList.remove('duplicate-error'); });
    const valueMap = new Map();
    for (let content of cellsA) { let val = content.innerText.trim(); if (val !== "") { if (!valueMap.has(val)) valueMap.set(val, []); valueMap.get(val).push(content.parentElement); } }
    for (let [val, cells] of valueMap.entries()) { if (cells.length > 1) cells.forEach(c => c.classList.add('duplicate-error')); }
  }
  
  function clearAllSelection() { for (let cell of selectedCells) cell.classList.remove('selected'); selectedCells.clear(); }
  
  function makeEditable(contentDiv, row, col) {
    if (col === 0) return;
    if (col === 1) {
      // UID কলাম - টগলের উপর নির্ভরশীল
      contentDiv.addEventListener('input', function() { 
        if (!isUndoRedo) pushToUndo();
        if(isUidValidationEnabled) {
          let raw = this.innerText;
          let onlyNumbers = raw.replace(/[^0-9]/g, '');
          if (onlyNumbers !== raw) this.innerText = onlyNumbers;
          let newVal = onlyNumbers;
          if(sheetData[row][1] !== newVal) {
            sheetData[row][1] = newVal;
            updateBFromARow(row, newVal);
          }
        } else {
          let newVal = this.innerText;
          if(sheetData[row][1] !== newVal) {
            sheetData[row][1] = newVal;
            updateBFromARow(row, newVal);
          }
        }
        saveToLocalStorageForUser(currentLoggedInUser);
        saveUserDataToFirebase(currentLoggedInUser);
        checkDuplicateHighlight();
      });
    } else if (col === 2) {
      contentDiv.addEventListener('blur', function() { const master = getMasterPassword(); if (sheetData[row][1] && sheetData[row][1].toString().trim() !== "" && master && master.trim() !== "") { if (this.innerText !== master) { this.innerText = master; sheetData[row][2] = master; if (!isUndoRedo) pushToUndo(); saveToLocalStorageForUser(currentLoggedInUser); saveUserDataToFirebase(currentLoggedInUser); } } });
      contentDiv.addEventListener('input', function() { if (!isUndoRedo) pushToUndo(); sheetData[row][2] = this.innerText; saveToLocalStorageForUser(currentLoggedInUser); saveUserDataToFirebase(currentLoggedInUser); });
    } else {
      contentDiv.addEventListener('input', function() { if (!isUndoRedo) pushToUndo(); sheetData[row][col] = this.innerText; saveToLocalStorageForUser(currentLoggedInUser); saveUserDataToFirebase(currentLoggedInUser); });
    }
  }
  
  function fullRender() {
    if (!sheetBody) sheetBody = document.getElementById('sheetBody'); if (!sheetBody) return;
    sheetBody.innerHTML = '';
    for (let row = 0; row < ROWS; row++) {
      const tr = document.createElement('tr');
      for (let col = 0; col < COLS; col++) {
        const td = document.createElement('td'); td.setAttribute('data-row', row); td.setAttribute('data-col', col); td.style.width = colWidths[col] + 'px'; td.style.minWidth = colWidths[col] + 'px';
        const contentDiv = document.createElement('div'); contentDiv.className = 'cell-content'; contentDiv.setAttribute('contenteditable', col !== 0 ? 'true' : 'false');
        let cellValue = sheetData[row][col]; if (col === 0 && (!cellValue || cellValue === "")) cellValue = (row+1).toString();
        contentDiv.innerText = cellValue || '';
        if (col === 0) { contentDiv.style.textAlign = 'center'; contentDiv.style.overflow = 'hidden'; contentDiv.style.whiteSpace = 'nowrap'; }
        td.appendChild(contentDiv);
        if (col !== 0) { makeEditable(contentDiv, row, col); contentDiv.addEventListener('click', (e) => { e.stopPropagation(); if (!e.ctrlKey && !e.metaKey) clearAllSelection(); td.classList.add('selected'); selectedCells.add(td); }); } else { td.addEventListener('click', (e) => e.stopPropagation()); }
        tr.appendChild(td);
      }
      sheetBody.appendChild(tr);
    }
    checkDuplicateHighlight();
    const b1Content = document.querySelector('#sheetBody td[data-row="0"][data-col="2"] .cell-content');
    if (b1Content) { b1Content.addEventListener('blur', () => { const newMaster = getMasterPassword(); if (newMaster && newMaster.trim() !== "") { for (let r = 0; r < ROWS; r++) { if (sheetData[r][1] && sheetData[r][1].toString().trim() !== "") { sheetData[r][2] = newMaster; const tBContent = document.querySelector(`#sheetBody td[data-row='${r}'][data-col='2'] .cell-content`); if (tBContent) tBContent.innerText = newMaster; } } saveToLocalStorageForUser(currentLoggedInUser); saveUserDataToFirebase(currentLoggedInUser); } }); }
    restoreScrollPosition();
    addResizeHandles(); 
    bindColumnSelection();
  }
  
  function addResizeHandles() {
    const ths = document.querySelectorAll('#headerRow th');
    ths.forEach((th, idx) => {
      if (idx === 0) return;
      let existingHandle = th.querySelector('.resize-handle');
      if(existingHandle) existingHandle.remove();
      let handle = document.createElement('div'); handle.className = 'resize-handle';
      let startX, startW, isResizing = false;
      const onMove = (e) => { if (!isResizing) return; let clientX = e.touches ? e.touches[0].clientX : e.clientX; let diff = clientX - startX; let newW = startW + diff; if (newW < 60) newW = 60; if (newW > 180) newW = 180; colWidths[idx] = newW; const allCells = document.querySelectorAll(`#sheetBody td[data-col='${idx}'], #headerRow th[data-col='${idx}']`); allCells.forEach(cell => { cell.style.width = newW + 'px'; cell.style.minWidth = newW + 'px'; }); };
      const onUp = () => { isResizing = false; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onUp); };
      handle.addEventListener('touchstart', (e) => { e.preventDefault(); isResizing = true; startX = e.touches[0].clientX; startW = colWidths[idx]; window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onUp); });
      handle.addEventListener('mousedown', (e) => { e.preventDefault(); isResizing = true; startX = e.clientX; startW = colWidths[idx]; window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp); });
      th.appendChild(handle); th.style.position = 'relative';
    });
  }
  
  function bindColumnSelection() {
    const headers = document.querySelectorAll('#headerRow th');
    headers.forEach((th, colIdx) => { if (colIdx === 0) return; th.addEventListener('click', (e) => { if (e.target.classList?.contains('resize-handle') || e.target.classList?.contains('uid-toggle-switch')) return; clearAllSelection(); document.querySelectorAll(`#sheetBody td[data-col='${colIdx}']`).forEach(cell => { cell.classList.add('selected'); selectedCells.add(cell); }); showToast(`${th.innerText} সিলেক্টেড`); }); });
  }
  
  function selectAllDataColumns() { clearAllSelection(); for (let col = 1; col < COLS; col++) { document.querySelectorAll(`#sheetBody td[data-col='${col}']`).forEach(cell => { cell.classList.add('selected'); selectedCells.add(cell); }); } showToast("📌 সব ডাটা কলাম সিলেক্ট হয়েছে"); }
  
  async function copySelected() {
    if (selectedCells.size === 0) { showToast("কিছু সিলেক্ট করেনি"); return; }
    let minR=Infinity, maxR=-Infinity, minC=Infinity, maxC=-Infinity;
    for (let cell of selectedCells) { let r = parseInt(cell.getAttribute('data-row')), c = parseInt(cell.getAttribute('data-col')); if (!isNaN(r) && !isNaN(c)) { minR = Math.min(minR, r); maxR = Math.max(maxR, r); minC = Math.min(minC, c); maxC = Math.max(maxC, c); } }
    if (minR === Infinity) { showToast("সিলেক্ট ভ্যালিড না"); return; }
    const matrix = Array(maxR-minR+1).fill().map(() => Array(maxC-minC+1).fill(''));
    for (let cell of selectedCells) { let r = parseInt(cell.getAttribute('data-row')), c = parseInt(cell.getAttribute('data-col')); const contentDiv = cell.querySelector('.cell-content'); matrix[r-minR][c-minC] = contentDiv ? contentDiv.innerText : ''; }
    const tsv = matrix.map(row => row.join('\t')).join('\n');
    try { await navigator.clipboard.writeText(tsv); showToast(`📋 ${selectedCells.size} সেল কপি`); } catch(e) { showToast("কপি ব্যর্থ"); }
  }
  
  function deleteSelected() {
    if (selectedCells.size === 0) { showToast("সিলেক্ট করুন"); return; }
    pushToUndo(); const cellsToDelete = Array.from(selectedCells);
    for (let cell of cellsToDelete) { let r = parseInt(cell.getAttribute('data-row')), c = parseInt(cell.getAttribute('data-col')); const contentDiv = cell.querySelector('.cell-content'); if (contentDiv && c !== 0) { contentDiv.innerText = ''; sheetData[r][c] = ''; } if (c === 1) updateBFromARow(r, ''); }
    saveToLocalStorageForUser(currentLoggedInUser); saveUserDataToFirebase(currentLoggedInUser); checkDuplicateHighlight(); clearAllSelection(); showToast(`🗑️ ${cellsToDelete.length} টি সেল ডিলিট হয়েছে`);
  }
  
  function saveUserInfo() {
    let username = tgUsernameInput.value.trim();
    let chatId = tgChatIdInput.value.trim();
    if (username && !username.startsWith('@')) username = '@' + username;
    currentTelegramUsername = username;
    currentChatId = chatId || "";
    if(firebaseDb && currentLoggedInUser) { saveUserDataToFirebase(currentLoggedInUser); }
    showToast(`💾 সেভ হয়েছে (টেলিগ্রাম: ${currentTelegramUsername || "ফাঁকা"})`);
  }

  // ==================== টেলিগ্রাম ফাংশন (সংশোধিত) ====================
  function getNewUnsubmittedUIDs() { let arr = []; for (let i=0;i<ROWS;i++) { let uid = sheetData[i][1]?.toString().trim(); if(uid && !submittedUIDs.has(uid)) arr.push({ row:i, uid, password: sheetData[i][2]||"", cookies: sheetData[i][3]||"", colD: sheetData[i][4]||"", colE: sheetData[i][5]||"" }); } return arr; }
  function hasAnyUnsubmittedData() { for (let i=0;i<ROWS;i++) { let uid = sheetData[i][1]?.toString().trim(); if(uid && !submittedUIDs.has(uid)) return true; } return false; }
  async function sendTelegramFile(chatId, file, caption) { if (!chatId) return false; try { const formData = new FormData(); formData.append("chat_id", chatId); formData.append("document", file); formData.append("caption", caption); formData.append("parse_mode", "HTML"); const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: "POST", body: formData }); const result = await response.json(); return result.ok; } catch(e) { return false; } }
  function getTomorrowDay() { const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1); return tomorrow.getDate(); }
  
  function showSubmitWarning() { 
    const modalDiv = document.createElement('div'); 
    modalDiv.className = 'warning-modal-overlay'; 
    modalDiv.innerHTML = `
      <div class="warning-modal">
        <div class="icon">⚠️</div>
        <h3>টেলিগ্রাম তথ্য আবশ্যক!</h3>
        <div class="message">
          📌 ফাইল সাবমিট করতে আপনার টেলিগ্রাম ইউজারনেম এবং চ্যাট আইডি প্রয়োজন।<br><br>
          👤 উপরের <strong>"টেলিগ্রাম ইউজার"</strong> বক্সে আপনার ইউজারনেম দিন<br>
          🆔 <strong>"চ্যাট আইডি"</strong> বক্সে আপনার চ্যাট আইডি দিন<br>
          💾 সবশেষে <strong>"তথ্য সেভ করুন"</strong> বাটনে ক্লিক করুন।
        </div>
        <button onclick="this.closest('.warning-modal-overlay').remove()">✅ বুঝেছি, সেট করব</button>
      </div>`; 
    document.body.appendChild(modalDiv); 
  }
  
  function showSubmitConfirmation() { 
    return new Promise((resolve) => { 
      const existing = document.querySelector('.confirm-modal-overlay'); 
      if(existing) existing.remove(); 
      const newDataCount = getNewUnsubmittedUIDs().length; 
      const modalDiv = document.createElement('div'); 
      modalDiv.className = 'confirm-modal-overlay'; 
      modalDiv.innerHTML = `
        <div class="confirm-modal">
          <div class="icon">📋</div>
          <h3>সাবমিট কনফার্মেশন</h3>
          <div class="info-box">
            <strong>👤 টেলিগ্রাম ইউজার:</strong> ${escapeHtml(currentTelegramUsername || "সেট করা হয়নি")}<br>
            <strong>🆔 চ্যাট আইডি:</strong> ${escapeHtml(currentChatId || "সেট করা হয়নি")}<br>
            <strong>📊 মোট আইডি:</strong> ${newDataCount} টি<br>
            <strong>📅 তারিখ:</strong> ${new Date().toLocaleDateString('bn-BD')}
          </div>
          <div class="account-input-area">
            <label>📁 কি একাউন্ট জমা দিবেন সেটার নাম লিখুন 👇 <span class="required-star">*</span></label>
            <input type="text" id="confirmAccountType" placeholder="যেমন: 0FND COOKIES , 2FA+COOKIES" autocomplete="off">
            <div class="input-hint">⚠️ একাউন্টের নাম লেখা বাধ্যতামূলক</div>
          </div>
          <div class="confirm-actions">
            <button class="confirm-yes" id="confirmYesBtn">✅ হ্যাঁ, সাবমিট করুন</button>
            <button class="confirm-no" id="confirmNoBtn">❌ বাতিল করুন</button>
          </div>
        </div>`; 
      document.body.appendChild(modalDiv); 
      const yesBtn = document.getElementById('confirmYesBtn'); 
      const noBtn = document.getElementById('confirmNoBtn'); 
      const accountInput = document.getElementById('confirmAccountType'); 
      const cleanup = () => modalDiv.remove(); 
      yesBtn.addEventListener('click', () => { 
        const accountType = accountInput ? accountInput.value.trim() : ""; 
        if(accountType === "") { 
          showToast("⚠️ দয়া করে একাউন্টের নাম লিখুন"); 
          accountInput.style.borderColor = "#dc2626"; 
          accountInput.focus(); 
          return; 
        } 
        cleanup(); 
        resolve({ confirmed: true, accountType }); 
      }); 
      noBtn.addEventListener('click', () => { cleanup(); resolve({ confirmed: false, accountType: "" }); }); 
      modalDiv.addEventListener('click', (e) => { if(e.target === modalDiv) { cleanup(); resolve({ confirmed: false, accountType: "" }); } }); 
      if(accountInput) { accountInput.addEventListener('input', () => { accountInput.style.borderColor = "#cbd5e1"; }); } 
    }); 
  }
  
  async function sendToTelegram() { 
    if(!currentLoggedInUser) return; 
    if(!currentChatId || !currentTelegramUsername) { 
      showSubmitWarning(); 
      return; 
    } 
    if(!hasAnyUnsubmittedData()) { 
      showToast("ℹ️ কোনো নতুন UID নেই!"); 
      return; 
    } 
    const { confirmed, accountType } = await showSubmitConfirmation(); 
    if(!confirmed) { 
      showToast("সাবমিশন বাতিল"); 
      return; 
    } 
    const newData = getNewUnsubmittedUIDs(); 
    if(newData.length===0) return; 
    const excelRows = newData.map(r => [r.uid, r.password, r.cookies, r.colD, r.colE]); 
    const ws = XLSX.utils.aoa_to_sheet(excelRows); 
    ws['!cols'] = [{wch:12},{wch:12},{wch:12},{wch:12},{wch:12}]; 
    const wb = XLSX.utils.book_new(); 
    XLSX.utils.book_append_sheet(wb, ws, "EBH_Data"); 
    const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' }); 
    const blob = new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }); 
    const file = new File([blob], `ebh_data_${Date.now()}.xlsx`, { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }); 
    const tomorrowDay = getTomorrowDay(); 
    const todayDate = new Date().getDate(); 
    const accountTypeMsg = accountType ? `📂 <b>একাউন্ট ধরণ:</b> ${escapeHtml(accountType)}\n` : ""; 
    
    const userCaption = `✅ <b>আপনার ফাইলটি সফলভাবে সাবমিট হয়েছে!</b> ✅\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━\n👤 <b>আপনার টেলিগ্রাম ইউজার:</b> ${escapeHtml(currentTelegramUsername)}\n📊 <b>মোট আইডি:</b> ${newData.length} টি\n${accountTypeMsg}📅 <b>সাবমিটের তারিখ:</b> ${todayDate}\n━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n🍀 আপনার নতুন সকল আইডি গুলো সাবমিট হয়েছে।\n📌 আপনি <b>${tomorrowDay}</b> তারিখ দিয়ে নতুন করে কাজ শুরু করে দিন।\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━\n❤️ <b>𝗘𝗔𝗥𝗡𝗜𝗡𝗚 𝗕𝗬 𝗛𝗔𝗕𝗜𝗕</b>\n🤝 সাথে থাকার জন্য আপনাকে ধন্যবাদ! 🙏`; 
    
    const adminCaption = `📊 <b>EBH ডাটা সাবমিট</b>\n━━━━━━━━━━━━━━━━━━━━━━━━━━\n👤 টেলিগ্রাম ইউজার: ${escapeHtml(currentTelegramUsername)}\n🆔 চ্যাট আইডি: ${escapeHtml(currentChatId)}\n${accountTypeMsg}📋 মোট নতুন UID: ${newData.length} টি\n📅 সময়: ${new Date().toLocaleString('bn-BD')}\n━━━━━━━━━━━━━━━━━━━━━━━━━━\n✅ সাবমিশন সফল হয়েছে!`; 
    
    showToast(`⏳ ${newData.length} টি নতুন UID সাবমিট হচ্ছে...`); 
    try { 
      const adminSent = await sendTelegramFile(YOUR_CHAT_ID, file, adminCaption); 
      let userSent = false; 
      if(currentChatId) userSent = await sendTelegramFile(currentChatId, file, userCaption); 
      if(adminSent || userSent) { 
        for(const item of newData) submittedUIDs.add(item.uid); 
        saveToLocalStorageForUser(currentLoggedInUser); 
        saveUserDataToFirebase(currentLoggedInUser); 
        let statusMessage = userSent ? "✅ আপনার টেলিগ্রাম ইনবক্সে ফাইল পাঠানো হয়েছে!" : "✅ ফাইল অ্যাডমিনের চ্যাটে পাঠানো হয়েছে!"; 
        const modalDiv = document.createElement('div'); 
        modalDiv.className = 'modal-overlay'; 
        modalDiv.innerHTML = `
          <div class="modal-content">
            <div style="font-size:40px;">✅</div>
            <div style="font-size:20px; font-weight:bold; margin:10px 0;">সাবমিট সফল!</div>
            <div style="background:#f1f5f9; padding:12px; border-radius:16px; margin:12px 0; text-align:left;">
              <p><strong>👤 টেলিগ্রাম ইউজার:</strong> ${escapeHtml(currentTelegramUsername)}</p>
              <p><strong>🆔 চ্যাট আইডি:</strong> ${escapeHtml(currentChatId)}</p>
              <p><strong>📁 একাউন্ট ধরণ:</strong> ${escapeHtml(accountType)}</p>
              <p><strong>📊 নতুন সাবমিট:</strong> ${newData.length} টি UID</p>
              <p style="margin-top:10px;"><span style="color:#137333;">${statusMessage}</span></p>
            </div>
            <button class="close-modal-btn" onclick="this.parentElement.parentElement.remove()">🔒 ক্লোজ</button>
          </div>`; 
        document.body.appendChild(modalDiv); 
        showToast(`✅ ${newData.length} টি নতুন UID সাবমিট হয়েছে!`); 
      } else { 
        showToast("❌ ফাইল পাঠাতে ব্যর্থ!"); 
      } 
    } catch(err) { 
      showToast("❌ নেটওয়ার্ক ত্রুটি"); 
    } 
  }

  function checkSystemStatus() { if(!firebaseDb) return; if(systemStatusListener) systemStatusListener.off(); systemStatusListener = firebaseDb.ref('systemControl/status'); systemStatusListener.on('value', (snapshot) => { const data = snapshot.val(); const isOn = data === null ? true : data.isOn !== false; const existing = document.querySelector('.system-off-overlay'); if(existing) existing.remove(); if(!isOn) { const overlay = document.createElement('div'); overlay.className = 'system-off-overlay'; overlay.innerHTML = `<div class="system-off-card"><div style="font-size:40px;">🔒</div><h3>সিস্টেম বন্ধ আছে</h3></div>`; document.body.appendChild(overlay); document.querySelectorAll('#sheetBody td .cell-content').forEach(cell => cell.setAttribute('contenteditable', 'false')); } else { document.querySelectorAll('#sheetBody td .cell-content').forEach(cell => { if(cell.parentElement && cell.parentElement.getAttribute('data-col') !== '0') cell.setAttribute('contenteditable', 'true'); }); } }); }
  
  function saveScrollPosition() { if(tableWrapper) localStorage.setItem(SCROLL_POSITION_KEY, JSON.stringify({ scrollTop: tableWrapper.scrollTop, scrollLeft: tableWrapper.scrollLeft })); }
  function restoreScrollPosition() { if(!tableWrapper) return; try { const saved = localStorage.getItem(SCROLL_POSITION_KEY); if(saved) { const {scrollTop, scrollLeft} = JSON.parse(saved); setTimeout(() => { tableWrapper.scrollTop = scrollTop||0; tableWrapper.scrollLeft = scrollLeft||0; }, 50); } } catch(e){} }

  function bindButtons() { 
    document.getElementById('undoBtn').addEventListener('click', undo);
    document.getElementById('redoBtn').addEventListener('click', redo);
    document.getElementById('copyBtn').addEventListener('click', copySelected);
    document.getElementById('deleteBtn').addEventListener('click', deleteSelected);
    document.getElementById('clearSelectionBtn').addEventListener('click', () => { clearAllSelection(); showToast("সিলেকশন ক্লিয়ার"); });
    document.getElementById('selectAllColsBtn').addEventListener('click', selectAllDataColumns);
    document.getElementById('saveUserBtn').addEventListener('click', saveUserInfo);
    document.getElementById('submitMainBtn').addEventListener('click', sendToTelegram);
    document.getElementById('logoutHeaderBtn').addEventListener('click', logout);
    if(uidToggle) uidToggle.addEventListener('click', toggleUidValidation);
  }

  function setupInputFocus() { 
    const save = document.getElementById('saveUserBtn');
    if(tgUsernameInput && tgChatIdInput && save) { 
      const show = () => save.classList.add('show'); const hide = () => save.classList.remove('show');
      tgUsernameInput.addEventListener('focus', show); tgUsernameInput.addEventListener('blur', hide);
      tgChatIdInput.addEventListener('focus', show); tgChatIdInput.addEventListener('blur', hide);
    }
  }

  async function init() {
    sheetBody = document.getElementById('sheetBody');
    tableWrapper = document.getElementById('tableWrapper');
    if(tableWrapper) tableWrapper.addEventListener('scroll', saveScrollPosition);
    loadUidValidationState();
    bindButtons();
    setupInputFocus();
    checkSystemStatus();
    if(tgChatIdInput) tgChatIdInput.addEventListener('input', function(e) { this.value = this.value.replace(/[^0-9]/g, ''); });
    loginBtn.addEventListener('click', handleLoginOrRegister);
    loginUsername.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleLoginOrRegister(); });
    loginPassword.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleLoginOrRegister(); });
    
    loadingScreen.classList.remove('hide');
    const autoLogged = await checkAutoLogin();
    if(!autoLogged) {
      loadingScreen.classList.add('hide');
      loginOverlay.classList.add('visible');
      appContainer.classList.remove('visible');
    } else {
      loadingScreen.classList.add('hide');
      loginOverlay.classList.remove('visible');
      appContainer.classList.add('visible');
    }
  }
  
  init();
})();
</script>
